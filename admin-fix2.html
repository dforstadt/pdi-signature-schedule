<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Fix — Angela T</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
  body{font-family:Arial,sans-serif;max-width:640px;margin:60px auto;padding:24px;background:#f7f5f2;}
  h2{color:#1B2A4A;margin-bottom:4px;}
  .sub{color:#888;font-size:13px;margin-bottom:24px;}
  .card{background:white;border-radius:8px;padding:20px;margin-bottom:16px;border:1px solid #e0ddd8;}
  .label{font-size:11px;font-weight:bold;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
  .val{font-size:14px;color:#1B2A4A;font-weight:bold;}
  .change{color:#1D9E75;}
  .log{background:#1B2A4A;color:#90EE90;padding:16px;border-radius:8px;font-family:monospace;
       font-size:13px;min-height:100px;white-space:pre-wrap;margin-top:16px;}
  button{background:#1B2A4A;color:white;padding:12px 32px;border:none;border-radius:6px;
         font-size:14px;cursor:pointer;margin-top:8px;width:100%;}
  button:hover{background:#2A3F6A;}
  button:disabled{background:#aaa;cursor:not-allowed;}
  .row{display:flex;gap:24px;margin-top:8px;}
  .field{flex:1;}
  .arrow{color:#999;font-size:18px;align-self:center;padding-top:16px;}
</style>
</head>
<body>
<h2>Admin Fix — Angela T</h2>
<p class="sub">Sets program = Both and pdiAdmit = 2026-07-03 on the Angela T client record.</p>

<div class="card">
  <div class="label">Client</div>
  <div class="val">Angela T</div>
  <div class="row">
    <div class="field">
      <div class="label" style="margin-top:12px">program (current)</div>
      <div class="val" id="cur-program">Loading…</div>
    </div>
    <div class="arrow">→</div>
    <div class="field">
      <div class="label" style="margin-top:12px">program (new)</div>
      <div class="val change">Both</div>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <div class="label" style="margin-top:12px">pdiAdmit (current)</div>
      <div class="val" id="cur-pdi">Loading…</div>
    </div>
    <div class="arrow">→</div>
    <div class="field">
      <div class="label" style="margin-top:12px">pdiAdmit (new)</div>
      <div class="val change">2026-07-03</div>
    </div>
  </div>
</div>

<button id="btn" onclick="applyFix()">Apply Fix</button>
<div class="log" id="log">Connecting to Firebase…</div>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyCERxntgytkfCHWN7EoAVYVmLBcfWyYZ5A',
  databaseURL:'https://pdi-signature-schedule-default-rtdb.firebaseio.com',
  projectId:'pdi-signature-schedule'
});
var FB = firebase.database().ref('schedule_v3');
var currentBlob = null;
var angelaIdx   = -1;

function log(msg){
  var el=document.getElementById('log');
  el.textContent += (el.textContent ? '\n' : '') + new Date().toISOString().slice(11,19)+' '+msg;
  el.scrollTop = el.scrollHeight;
}

// Load and preview current state on open
FB.once('value', function(snap){
  var raw = snap.val();
  if(!raw||!raw.blob){ log('ERROR: Could not read blob.'); return; }
  try{
    currentBlob = JSON.parse(raw.blob);
    var clients = currentBlob.clients || [];
    log('Loaded. '+clients.length+' clients in Firebase.');
    for(var i=0;i<clients.length;i++){
      if(clients[i].name && clients[i].name.toLowerCase().indexOf('angela')>=0){
        angelaIdx = i;
        document.getElementById('cur-program').textContent = clients[i].program || '(not set)';
        document.getElementById('cur-pdi').textContent     = clients[i].pdiAdmit || '(not set)';
        log('Found Angela T at index '+i+' (id: '+clients[i].id+')');
        log('Current program: "'+clients[i].program+'" | pdiAdmit: "'+(clients[i].pdiAdmit||'none')+'"');
        if(clients[i].program==='Both' && clients[i].pdiAdmit==='2026-07-03'){
          log('Already correct — no fix needed.');
          document.getElementById('btn').disabled=true;
          document.getElementById('btn').textContent='Already Fixed';
        }
        return;
      }
    }
    log('WARNING: Angela T not found in client list. Names: '+clients.map(function(c){return c.name;}).join(', '));
  }catch(e){ log('ERROR parsing blob: '+e); }
});

function applyFix(){
  if(!currentBlob || angelaIdx<0){ log('ERROR: Blob not loaded or Angela T not found.'); return; }
  var btn = document.getElementById('btn');
  btn.disabled=true; btn.textContent='Applying…';

  var clients = currentBlob.clients;
  var before  = {program: clients[angelaIdx].program, pdiAdmit: clients[angelaIdx].pdiAdmit};
  clients[angelaIdx].program  = 'Both';
  clients[angelaIdx].pdiAdmit = '2026-07-03';
  currentBlob.clients = clients;

  log('Changing program: "'+before.program+'" → "Both"');
  log('Changing pdiAdmit: "'+(before.pdiAdmit||'none')+'" → "2026-07-03"');

  var newBlob = JSON.stringify(currentBlob);
  var ts = Date.now();
  log('Saving ('+Math.round(newBlob.length/1024)+' KB)…');

  FB.set({blob:newBlob, ts:ts}).then(function(){
    log('SUCCESS — Angela T updated.');
    log('program = Both | pdiAdmit = 2026-07-03');
    log('Done. You can close this page.');
    btn.textContent='Fixed ✓';
    document.getElementById('cur-program').textContent='Both';
    document.getElementById('cur-pdi').textContent='2026-07-03';
  }).catch(function(e){
    log('ERROR saving: '+e);
    btn.disabled=false;
    btn.textContent='Retry Fix';
  });
}
</script>
</body>
</html>
