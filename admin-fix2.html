<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Admin — Provider Fix</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
body{font-family:Arial,sans-serif;max-width:620px;margin:48px auto;padding:24px;background:#f7f5f2}
h2{color:#1B2A4A;margin:0 0 4px}.sub{color:#888;font-size:13px;margin:0 0 24px}
.card{background:white;border-radius:8px;padding:20px;margin-bottom:16px;border:1px solid #e0ddd8}
button{background:#1B2A4A;color:white;padding:10px 24px;border:none;border-radius:6px;font-size:13px;cursor:pointer;width:100%;margin-top:10px}
button:hover{background:#2A3F6A}button:disabled{background:#aaa}
.log{background:#1B2A4A;color:#90EE90;padding:14px;border-radius:6px;font-family:monospace;font-size:12px;min-height:80px;white-space:pre-wrap;margin-top:16px}
</style></head>
<body>
<h2>Admin — Provider Stipend Fix</h2>
<p class="sub">Sets Dr. Flavia to "not eligible" in the Firebase provider roster.</p>
<div class="card">
  <p style="font-size:13px;margin:0 0 12px">Sets <strong>Dr. Flavia</strong> stipendType = "none" / noStipend = true in Firebase.</p>
  <button id="btn" onclick="fix()">Apply Fix</button>
</div>
<div class="log" id="log">Ready.</div>
<script>
firebase.initializeApp({apiKey:"AIzaSyCERxntgytkfCHWN7EoAVYVmLBcfWyYZ5A",
  databaseURL:"https://pdi-signature-schedule-default-rtdb.firebaseio.com",
  projectId:"pdi-signature-schedule"});
var FB=firebase.database().ref("schedule_v3");
function log(m){var el=document.getElementById("log");el.textContent+=(el.textContent?"\n":"")+new Date().toISOString().slice(11,19)+" "+m;el.scrollTop=el.scrollHeight;}
function fix(){
  var btn=document.getElementById("btn");btn.disabled=true;btn.textContent="Working...";
  log("Reading blob...");
  FB.once("value",function(snap){
    var raw=snap.val();if(!raw||!raw.blob){log("ERROR: cannot read blob");btn.disabled=false;return;}
    var blob;try{blob=JSON.parse(raw.blob);}catch(e){log("ERROR: "+e);btn.disabled=false;return;}
    var providers=blob.providers||{};
    // Fix Dr. Flavia
    var found=false;
    Object.keys(providers).forEach(function(k){
      if(k.toLowerCase().indexOf("flavia")>=0){
        log("Found provider: "+k);
        providers[k].stipendType="none";
        providers[k].noStipend=true;
        found=true;
      }
    });
    if(!found){
      log("Dr. Flavia not found in providers — she may not have sessions in Firebase.");
      log("The noStipend exclusion list in stipends.html already excludes her by name.");
      log("No Firebase change needed.");
      btn.textContent="Done (no change needed)";
      return;
    }
    blob.providers=providers;
    var b=JSON.stringify(blob);
    log("Saving ("+Math.round(b.length/1024)+" KB)...");
    FB.set({blob:b,ts:Date.now()}).then(function(){
      log("SUCCESS — Dr. Flavia set to not eligible.");
      btn.textContent="Done ✓";
    }).catch(function(e){log("ERROR: "+e);btn.disabled=false;btn.textContent="Retry";});
  });
}
</script></body></html>
