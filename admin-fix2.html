<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Client Inspector</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:32px auto;padding:20px;background:#f7f5f2;}
h2{color:#1B2A4A;margin-bottom:4px;}
.sub{color:#888;font-size:13px;margin-bottom:20px;}
input{padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:13px;width:200px;}
button{background:#1B2A4A;color:white;padding:9px 20px;border:none;border-radius:6px;
       font-size:13px;cursor:pointer;margin-left:8px;}
table{width:100%;border-collapse:collapse;margin-top:16px;font-size:12px;}
th{background:#1B2A4A;color:white;padding:8px;text-align:left;}
td{padding:6px 8px;border-bottom:1px solid #e0ddd8;}
tr:nth-child(even){background:#f0ede8;}
.match{background:#EAF5EE!important;font-weight:bold;}
.warn{color:#c00;}
.ok{color:#157A52;}
.na{color:#999;}
</style>
</head>
<body>
<h2>Firebase Client Inspector</h2>
<p class="sub">Shows all clients in Firebase blob — use to diagnose missing clients in financial model.</p>

<div style="margin-bottom:16px">
  <input id="search" placeholder="Search name (e.g. Cassie)" oninput="filterTable()">
  <button onclick="filterTable()">Filter</button>
  <button onclick="document.getElementById('search').value='';filterTable()" 
          style="background:#888">Clear</button>
  <span id="count" style="margin-left:12px;font-size:12px;color:#666"></span>
</div>

<table id="tbl">
<thead><tr>
  <th>Name</th><th>program</th><th>pdiAdmit</th><th>pdiDischarge</th>
  <th>sigAdmit</th><th>sigDischarge</th><th>startDate</th><th>endDate</th>
  <th>Financial?</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyCERxntgytkfCHWN7EoAVYVmLBcfWyYZ5A',
  databaseURL:'https://pdi-signature-schedule-default-rtdb.firebaseio.com',
  projectId:'pdi-signature-schedule'
});

var SIG_HARD = ['tomas w','jarrod w','emma t','david r','joseph g','arianna b',
                'alex a','peter s','george r','chayse b','louis r','jack s',
                'layla s (r)','layla s r','william c'];
var PDI_HARD = ['matthew h','leslie k','abbegail m','alex r','francis r','thomas w','norman p'];
var STEP_HARD= ['carlos l','jessica c','george w','marc c','michael f',
                'kevin c','layla s','blake p','angela t'];
var ALL_HARD = SIG_HARD.concat(PDI_HARD).concat(STEP_HARD);

var allClients = [];

firebase.database().ref('schedule_v3').once('value', function(snap){
  var raw = snap.val();
  if(!raw || !raw.blob){ document.getElementById('tbody').innerHTML='<tr><td colspan="9" class="warn">Cannot read blob</td></tr>'; return; }
  try{
    var d = JSON.parse(raw.blob);
    allClients = (d.clients||[]).sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
    renderTable(allClients);
  }catch(e){ document.getElementById('tbody').innerHTML='<tr><td colspan="9" class="warn">Parse error: '+e+'</td></tr>'; }
});

function val(v){ return v||'<span class="na">—</span>'; }

function financialStatus(c){
  var p=(c.program||'').trim();
  var n=(c.name||'').toLowerCase().trim();
  var isHard = ALL_HARD.indexOf(n)>=0;
  if(isHard) return '<span style="color:#888">Hardcoded</span>';
  if(p==='Signature'||p==='Both'){
    if(c.sigAdmit) return '<span class="ok">→ Sig tab ✓</span>';
    else return '<span class="warn">No sigAdmit</span>';
  }
  if(p==='PDI'){
    if(c.pdiAdmit) return '<span class="ok">→ PDI tab ✓</span>';
    else return '<span class="warn">No pdiAdmit</span>';
  }
  if(p==='Both'&&c.pdiAdmit&&c.sigAdmit) return '<span class="ok">→ Step tab ✓</span>';
  return '<span class="warn">No program or missing dates</span>';
}

function renderTable(clients){
  var rows = clients.map(function(c){
    var n=(c.name||'').toLowerCase().trim();
    var isHard=ALL_HARD.indexOf(n)>=0;
    var rowClass=!isHard&&((c.program||'').trim()==='Signature'||(c.program||'').trim()==='Both')?' class="match"':'';
    return '<tr'+rowClass+'>'
      +'<td>'+val(c.name)+'</td>'
      +'<td><b>'+val(c.program)+'</b></td>'
      +'<td>'+val(c.pdiAdmit)+'</td>'
      +'<td>'+val(c.pdiDischarge||c.pdiDisch)+'</td>'
      +'<td>'+val(c.sigAdmit)+'</td>'
      +'<td>'+val(c.sigDischarge||c.sigDisch)+'</td>'
      +'<td>'+val(c.startDate)+'</td>'
      +'<td>'+val(c.endDate)+'</td>'
      +'<td>'+financialStatus(c)+'</td>'
      +'</tr>';
  }).join('');
  document.getElementById('tbody').innerHTML = rows || '<tr><td colspan="9" class="na">No clients</td></tr>';
  document.getElementById('count').textContent = clients.length + ' clients';
}

function filterTable(){
  var q = document.getElementById('search').value.toLowerCase().trim();
  if(!q){ renderTable(allClients); return; }
  renderTable(allClients.filter(function(c){ return (c.name||'').toLowerCase().indexOf(q)>=0; }));
}
</script>
</body>
</html>
