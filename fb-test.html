<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Firebase Test</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head><body>
<div id="s" style="padding:40px;font-family:sans-serif;font-size:18px">Testing Firebase...</div>
<script>
var s=document.getElementById('s');
try {
  s.innerHTML='SDK loaded. Initializing...';
  firebase.initializeApp({
    apiKey:"AIzaSyCERxntgytkfCHWN7EoAVYVmLBcfWyYZ5A",
    databaseURL:"https://pdi-signature-schedule-default-rtdb.firebaseio.com",
    projectId:"pdi-signature-schedule"
  });
  s.innerHTML='Initialized. Connecting...';
  var db=firebase.database();
  db.ref('schedule_v3').once('value').then(function(snap){
    s.innerHTML='<span style="color:green">✓ CONNECTED — got '+(snap.val()?'data':'null')+'</span>';
  }).catch(function(err){
    s.innerHTML='<span style="color:red">✗ ERROR: '+err.code+' — '+err.message+'</span>';
  });
} catch(e) {
  s.innerHTML='<span style="color:red">✗ JS ERROR: '+e.message+'</span>';
}
</script>
</body></html>
