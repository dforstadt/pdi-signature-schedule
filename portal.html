.card{
  width:420px;
  background:rgba(255,252,247,.85);
  border:.5px solid rgba(180,160,130,.25);
  border-radius:20px;
  padding:44px 40px 36px;
  backdrop-filter:blur(24px);
  text-align:center;
  box-shadow:0 4px 24px rgba(120,100,70,.1),0 24px 60px rgba(120,100,70,.12);
}
.logos{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:32px;}
.logos img{height:34px;object-fit:contain;opacity:.9;}
.logo-sep{width:.5px;height:28px;background:rgba(140,120,90,.25);}
.title{font-size:18px;font-weight:700;color:#2c2417;margin-bottom:6px;letter-spacing:-.2px;}
.subtitle{font-size:12px;color:#8a7a62;margin-bottom:36px;line-height:1.6;}
.input-wrap{margin-bottom:10px;}
.input-wrap input{
  width:100%;padding:13px 18px;border-radius:12px;
  border:1px solid rgba(160,135,100,.3);
  background:rgba(255,253,248,.9);
  color:#2c2417;font-size:14px;letter-spacing:.08em;text-align:center;
  font-family:var(--f);outline:none;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:inset 0 1px 3px rgba(120,100,70,.06);
}
.input-wrap input::placeholder{color:#b5a48a;letter-spacing:0;}
.input-wrap input:focus{
  border-color:rgba(160,130,90,.6);
  box-shadow:0 0 0 3px rgba(190,165,120,.15),inset 0 1px 3px rgba(120,100,70,.06);
}
#err{font-size:12px;color:#b35c3a;min-height:18px;margin-bottom:12px;}
.btn{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#6b5c45,#4a3d2c);
  color:#f5efe4;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--f);letter-spacing:.03em;
  transition:opacity .15s,transform .1s;margin-bottom:24px;
  box-shadow:0 4px 14px rgba(80,60,30,.25);
}
.btn:hover{opacity:.88;}
.btn:active{transform:scale(.98);}
.btn.success{background:linear-gradient(135deg,#4a7c59,#335540);box-shadow:0 4px 14px rgba(50,90,60,.2);}
.links{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
.link-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:20px;
  border:1px solid rgba(160,135,100,.3);
  background:rgba(255,252,245,.7);
  color:#6b5c45;font-size:11px;font-weight:600;
  text-decoration:none;font-family:var(--f);
  transition:all .15s;box-shadow:0 1px 4px rgba(120,100,70,.08);
}
.link-chip:hover{
  background:rgba(255,250,240,.95);border-color:rgba(140,115,80,.5);
  color:#4a3d2c;box-shadow:0 2px 8px rgba(120,100,70,.14);
}
.footer{margin-top:24px;font-size:10px;color:#b5a48a;letter-spacing:.04em;}
</style>
</head>

<script>
var PASS='Lifeskills2024!';
var LINKS=['link-cal','link-stip','link-metrics','link-fin'];
function unlock(){
  LINKS.forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='inline-flex';});
  var btn=document.getElementById('btn');
  btn.textContent='Welcome ✓';btn.classList.add('success');
  document.getElementById('pw').style.display='none';
  try{sessionStorage.setItem('portal_auth','1');}catch(e){}
}
function tryAuth(){
  var pw=document.getElementById('pw').value;
  if(pw===PASS){
    document.getElementById('err').textContent='';unlock();
  } else {
    document.getElementById('err').textContent='Incorrect access code.';
    document.getElementById('pw').value='';document.getElementById('pw').focus();
    var c=document.querySelector('.card');
    c.style.transition='transform .08s';c.style.transform='translateX(-7px)';
    setTimeout(function(){c.style.transform='translateX(7px)';},80);
    setTimeout(function(){c.style.transform='none';},160);
  }
}
document.getElementById('btn').addEventListener('click',tryAuth);
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryAuth();});
try{if(sessionStorage.getItem('portal_auth')==='1')unlock();}catch(e){}
setTimeout(function(){var p=document.getElementById('pw');if(p&&p.style.display!=='none')p.focus();},100);
</script>
