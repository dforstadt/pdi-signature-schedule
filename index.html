<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDI/Signature Schedule</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg:#fff;--bg2:#f8fafc;--bg-info:#eff6ff;--bg-ok:#f0fdf4;--bg-warn:#fef2f2;
      --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--tx-info:#1d4ed8;--tx-ok:#15803d;--tx-err:#b91c1c;
      --bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.16);--bd-info:#bfdbfe;--bd-ok:#bbf7d0;--bd-err:#fecaca;
      --r:8px;--rl:12px;--f:'Plus Jakarta Sans',-apple-system,sans-serif;
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1e293b;--bg2:#0f172a;--bg-info:#1e3a5f;--bg-ok:#052e16;--bg-warn:#450a0a;
        --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;--tx-info:#93c5fd;--tx-ok:#86efac;--tx-err:#fca5a5;
        --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.16);
        --bd-info:rgba(147,197,253,.3);--bd-ok:rgba(134,239,172,.3);--bd-err:rgba(252,165,165,.3);}
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--f);background:var(--bg2);color:var(--tx);padding:18px;min-height:100vh;}
    #app{max-width:1800px;margin:0 auto;}
    .card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
    .btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);border:.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:13px;color:var(--tx2);font-family:var(--f);white-space:nowrap;transition:background .12s;}
    .btn:hover{background:var(--bg2);} .btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn.grn{background:var(--bg-ok);border-color:var(--bd-ok);color:var(--tx-ok);}
    .btn.red{background:var(--bg-warn);border-color:var(--bd-err);color:var(--tx-err);}
    .btn.nav{font-size:18px;line-height:1;padding:5px 10px;}
    .ibtn{background:none;border:none;cursor:pointer;padding:4px;border-radius:var(--r);color:var(--tx3);display:flex;align-items:center;font-family:var(--f);transition:background .1s,color .1s;}
    .ibtn:hover{background:var(--bg2);color:var(--tx);}
    .day-tab{display:flex;flex-direction:column;align-items:center;padding:6px 11px;border-radius:var(--r);border:.5px solid var(--bd);background:transparent;cursor:pointer;font-family:var(--f);transition:all .15s;gap:2px;min-width:54px;}
    .day-tab:hover:not(.active){background:var(--bg2);} .day-tab.active{background:var(--bg-info);border-color:var(--bd-info);}
    .day-tab.active .dn,.day-tab.active .dd,.day-tab.active .dm,.day-tab.active .dc{color:var(--tx-info);}
    .day-tab.wknd .dn,.day-tab.wknd .dd,.day-tab.wknd .dm{color:var(--tx-err);}
    .day-tab.wknd.active .dn,.day-tab.wknd.active .dd,.day-tab.wknd.active .dm{color:var(--tx-info);}
    .day-tab.tday .dn,.day-tab.tday .dd,.day-tab.tday .dm{color:var(--tx-info);}
    .dn{font-size:10px;font-weight:500;color:var(--tx3);} .dd{font-size:14px;font-weight:600;color:var(--tx2);line-height:1;}
    .dm{font-size:9px;color:var(--tx3);line-height:1;} .dc{font-size:9px;color:var(--tx3);}
    .tdot{width:4px;height:4px;border-radius:50%;background:var(--tx-info);margin-top:1px;}
    .lpill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;transition:all .15s;font-size:12px;color:var(--tx2);}
    .lpill:hover{background:var(--bg2);} .lpill.dim{opacity:.3;}
    select,input[type=text],textarea{box-sizing:border-box;width:100%;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;}
    select:focus,input[type=text]:focus,textarea:focus{outline:2px solid #7F77DD;outline-offset:1px;border-color:#7F77DD;}
    input[type=color]{cursor:pointer;border:.5px solid var(--bd2);border-radius:6px;padding:2px;background:none;}
    #grid-wrap{border:.5px solid var(--bd);border-radius:var(--rl);overflow:auto;max-height:62vh;background:var(--bg);}
    #grid{display:flex;min-width:max-content;}
    .slot{height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .slot:hover{background:var(--bg2);} .slot:hover .ph{opacity:1;}
    .slot .ph{opacity:0;transition:opacity .15s;color:var(--tx3);font-size:20px;pointer-events:none;}
    .drop-target{background:var(--bg-info)!important;}
    .ecard{position:absolute;border-radius:var(--r);padding:6px 8px;color:#fff!important;overflow:hidden;z-index:2;user-select:none;cursor:grab;transition:filter .12s,transform .12s;}
    .ecard:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .prov-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bd);margin-bottom:6px;background:var(--bg);}
    .svc-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd);margin-bottom:5px;background:var(--bg);}
    .copy-dp{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 8px;border-radius:var(--r);border:1.5px solid var(--bd);cursor:pointer;transition:all .15s;min-width:40px;user-select:none;}
    .copy-dp.on{border-color:#7F77DD;background:#7F77DD18;} .copy-dp.we{color:var(--tx-err);}
    .copy-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd);cursor:pointer;transition:background .1s;}
    .copy-row:hover{background:var(--bg2);} .copy-row.on{border-color:#7f77dd55;background:#7f77dd08;}
    #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding-top:60px;overflow-y:auto;}
    #mbox{background:var(--bg);border-radius:var(--rl);padding:24px;width:440px;border:.5px solid var(--bd);max-height:85vh;overflow-y:auto;}
    @keyframes pu{0%,100%{opacity:1}50%{opacity:.25}} .pul{animation:pu 2s infinite;}
    @keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

// ── Date utils ─────────────────────────────────────────────────────────────
function toISO(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
function fromISO(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(iso,n){var d=fromISO(iso);d.setDate(d.getDate()+n);return toISO(d);}
function getMon(date){var d=new Date(date),day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return toISO(d);}
function todayISO(){return toISO(new Date());}
function weekDates(m){return[0,1,2,3,4,5,6].map(function(i){return addDays(m,i);});}
function isWknd(iso){var d=fromISO(iso).getDay();return d===0||d===6;}
function isToday(iso){return iso===todayISO();}
function fmtWD(iso){return fromISO(iso).toLocaleDateString('en-US',{weekday:'short'});}
function fmtS(iso){return fromISO(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtFull(iso){return fromISO(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function fmtRange(m){var d=weekDates(m);return fmtS(d[0])+' \u2013 '+fromISO(d[6]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

var TODAY=todayISO(),MON=getMon(new Date());
var S={
  title:'PDI/Signature Schedule',
  subtitle:'Click a slot to add \u00b7 drag to move \u00b7 click event to edit',
  clients:[],events:[],providers:{},services:[],
  mealServices:[],flaggedConflicts:[],
  weekStart:MON,selectedDate:TODAY,
  selClients:new Set(),drag:null,addingClient:false,
  filterProv:null,viewMode:'day',weekClient:'all'
};

var _uid=100;
function nid(){return 'i'+(++_uid)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rgb(hex){var h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function pc(name){return(S.providers[name]&&S.providers[name].color)||'#888';}
function mkProv(name){if(name&&!S.providers[name])S.providers[name]={color:PC[Object.keys(S.providers).length%PC.length]};}
function isMeal(svc){return S.mealServices.indexOf(svc)>-1;}

function conflicts(evs){
  var ids=new Set();
  for(var i=0;i<evs.length;i++){
    for(var j=i+1;j<evs.length;j++){
      var a=evs[i],b=evs[j];
      if(isMeal(a.service)||isMeal(b.service))continue;
      if(a.provider===b.provider&&a.slotIndex<b.slotIndex+b.duration&&a.slotIndex+a.duration>b.slotIndex){
        ids.add(a.id);ids.add(b.id);
      }
    }
  }
  return ids;
}

// ── Save / Load ────────────────────────────────────────────────────────────
var LS_KEY='pdi_sched_v1';
function getBlob(){
  return JSON.stringify({
    clients:S.clients,events:S.events,providers:S.providers,
    services:S.services,mealServices:S.mealServices,flaggedConflicts:S.flaggedConflicts,
    title:S.title,subtitle:S.subtitle
  });
}
function applyData(d){
  try{
    if(Array.isArray(d.clients)){S.clients=d.clients;S.selClients=new Set(d.clients.map(function(c){return c.id;}));}
    if(Array.isArray(d.events))S.events=d.events;
    if(d.providers&&typeof d.providers==='object'&&!Array.isArray(d.providers))S.providers=d.providers;
    if(Array.isArray(d.services))S.services=d.services;
    if(Array.isArray(d.mealServices))S.mealServices=d.mealServices;
    if(Array.isArray(d.flaggedConflicts))S.flaggedConflicts=d.flaggedConflicts;
    if(d.title)S.title=d.title;
    if(typeof d.subtitle==='string')S.subtitle=d.subtitle;
    return true;
  }catch(e){console.error('applyData:',e);return false;}
}
function saveAll(){
  var blob=getBlob();
  try{localStorage.setItem(LS_KEY,blob);}catch(e){}
  showSaveStatus();
  try{FB.set({blob:blob}).catch(function(){});}catch(e){}
}
function showSaveStatus(){
  var el=document.getElementById('save-status');if(!el)return;
  el.textContent='Saved \u2713';el.style.color='var(--tx-ok)';
  clearTimeout(el._t);el._t=setTimeout(function(){el.textContent='';},2500);
}
(function initLoad(){
  try{
    var local=localStorage.getItem(LS_KEY);
    if(local){var d=JSON.parse(local);if(applyData(d)){renderAll();setLive(true);return;}}
  }catch(e){}
  setLive(false);
  FB.once('value').then(function(snap){
    var raw=snap.val();
    if(raw&&raw.blob){try{var d=JSON.parse(raw.blob);if(applyData(d)){try{localStorage.setItem(LS_KEY,raw.blob);}catch(e){}}}catch(e){}}
    setLive(true);renderAll();
  }).catch(function(){setLive(false);renderAll();});
})();
function setLive(ok){
  var d=document.getElementById('ldot'),l=document.getElementById('llbl');
  if(d)d.style.background=ok?'#1D9E75':'#E24B4A';
  if(l)l.textContent=ok?'Live':'Offline';
}

// ── Navigation ─────────────────────────────────────────────────────────────
function shiftWeek(dir){
  S.weekStart=addDays(S.weekStart,dir*7);
  var wk=weekDates(S.weekStart),wd=fromISO(S.selectedDate).getDay();
  S.selectedDate=wk[wd===0?6:wd-1];
  renderAll();
}
function goToday(){S.weekStart=getMon(new Date());S.selectedDate=todayISO();renderAll();}
function selDate(d){S.selectedDate=d;renderAll();}
function togFilter(n){S.filterProv=S.filterProv===n?null:n;renderAll();}
function clearFilter(){S.filterProv=null;renderAll();}
function togSel(id,on){on?S.selClients.add(id):S.selClients.delete(id);renderSelBar();renderBadge();}
function setView(mode){
  S.viewMode=mode;
  var bd=document.getElementById('btn-day'),bw=document.getElementById('btn-week');
  if(bd){bd.style.background=mode==='day'?'#7F77DD':'transparent';bd.style.color=mode==='day'?'#fff':'var(--tx2)';}
  if(bw){bw.style.background=mode==='week'?'#7F77DD':'transparent';bw.style.color=mode==='week'?'#fff':'var(--tx2)';}
  var wcs=document.getElementById('week-client-selector');
  if(wcs)wcs.style.display=mode==='week'?'flex':'none';
  if(mode==='week')populateWeekClientSelect();
  renderAll();
}
function populateWeekClientSelect(){
  var sel=document.getElementById('week-client-select');if(!sel)return;
  var cur=S.weekClient||'all';
  sel.innerHTML='<option value="all">All Clients</option>'+
    S.clients.map(function(c){return '<option value="'+c.id+'"'+(c.id===cur?' selected':'')+'>'+esc(c.name)+'</option>';}).join('');
  if(cur&&cur!=='all')sel.value=cur;
}

function renderDayTabs(){
  var el=document.getElementById('day-tabs');if(!el)return;
  var wk=weekDates(S.weekStart);
  el.innerHTML=wk.map(function(date){
    var sel=date===S.selectedDate,tod=isToday(date),we=isWknd(date);
    var cnt=S.events.filter(function(e){return e.date===date;}).length;
    return '<button class="day-tab'+(sel?' active':'')+(tod?' tday':'')+(we?' wknd':'')+'" onclick="selDate(\''+date+'\')" title="'+fmtFull(date)+'">'+
      '<span class="dn">'+fmtWD(date)+'</span>'+
      '<span class="dd">'+fromISO(date).getDate()+'</span>'+
      '<span class="dm">'+fromISO(date).toLocaleDateString('en-US',{month:'short'})+'</span>'+
      (tod?'<div class="tdot"></div>':'')+
      '<span class="dc">'+(cnt?cnt+' session'+(cnt>1?'s':''):' ')+'</span></button>';
  }).join('');
}
function renderCBar(){
  var bar=document.getElementById('cbar');if(!bar)return;
  var de=S.events.filter(function(e){return e.date===S.selectedDate;}),cf=conflicts(de);
  if(!cf.size){bar.style.display='none';return;}
  var pm={};
  de.filter(function(e){return cf.has(e.id);}).forEach(function(e){if(!pm[e.provider])pm[e.provider]=[];pm[e.provider].push(e);});
  bar.innerHTML='<i class="ti ti-alert-triangle" style="font-size:14px;vertical-align:-2px;margin-right:6px"></i><strong>Double-booking:</strong> '+
    Object.keys(pm).map(function(p){return '<span style="display:inline-flex;align-items:center;gap:5px;margin:2px 4px;padding:2px 8px;border-radius:var(--r);background:rgba(255,255,255,.15)"><span style="width:8px;height:8px;border-radius:50%;background:'+pc(p)+';display:inline-block"></span>'+esc(p)+'</span>';}).join('');
  bar.style.display='block';
}
function renderLegend(){
  var el=document.getElementById('legend');if(!el)return;
  var de=S.events.filter(function(e){return e.date===S.selectedDate;}),cf=conflicts(de);
  var cp=new Set(de.filter(function(e){return cf.has(e.id);}).map(function(e){return e.provider;}));

    var n=entry[0],color=entry[1].color;
    var isA=fp===n,isD=fp&&fp!==n;
    var wkC=S.events.filter(function(e){return e.provider===n&&wk.includes(e.date);}).length;
    return '<div class="lpill'+(isD?' dim':'')+'" onclick="togFilter(\''+esc(n)+'\')" style="border-color:'+(isA?color:'transparent')+';background:'+(isA?color+'18':'transparent')+'">'+

      '<span style="font-size:10px;color:var(--tx3)">'+wkC+' this wk</span>'+

      (isA?'<i class="ti ti-check" style="font-size:10px;color:'+color+'"></i>':'')+
    '</div>';
  }).join('');
}
function renderFBar(){

}

// ── Week view ──────────────────────────────────────────────────────────────
function renderWeekGrid(){
  var grid=document.getElementById('grid');if(!grid)return;
  populateWeekClientSelect();
  var wk=weekDates(S.weekStart);
  var clientId=(S.weekClient&&S.weekClient!=='all')?S.weekClient:null;
  var NW=168, DW=138; // fixed px widths

  if(clientId){
    // ── Single client: time rows × day columns ─────────────────────────────
    var client=S.clients.find(function(c){return c.id===clientId;});
    if(!client){grid.innerHTML='<div style="padding:20px;color:var(--tx3)">Client not found.</div>';return;}

    var wrap=document.createElement('div');
    wrap.style.cssText='display:flex;min-width:max-content';

    // Time column
    var timeCol=document.createElement('div');
    timeCol.style.cssText='width:72px;flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--bg);border-right:.5px solid var(--bd)';
    var timeHdr=document.createElement('div');
    timeHdr.style.cssText='height:60px;position:sticky;top:0;z-index:11;background:var(--bg2);border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;padding:4px';
    timeHdr.innerHTML='<span style="font-size:11px;font-weight:600;color:var(--tx2);text-align:center">'+esc(client.name)+'</span>';
    timeCol.appendChild(timeHdr);
    SLOTS.forEach(function(s){
      var oh=s.m===0;
      var cell=document.createElement('div');
      cell.style.cssText='height:'+SH+'px;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 8px 0 0;font-size:11px;'+
        'color:'+(oh?'var(--tx2)':'var(--tx3)')+';font-weight:'+(oh?600:400)+';'+
        'border-bottom:'+(oh?'0.5px solid var(--bd)':'0.5px dashed var(--bd)')+';';
      cell.innerHTML=oh?esc(s.label):'<span style="opacity:.4">&middot;30</span>';
      timeCol.appendChild(cell);
    });
    wrap.appendChild(timeCol);

    // Day columns
    wk.forEach(function(date){
      var we=isWknd(date),tod=isToday(date);
      var dayEvs=S.events.filter(function(e){return e.date===date&&e.clientId===clientId;});
      var cf=conflicts(dayEvs);
      var hbg=we?'var(--bg-warn)':tod?'var(--bg-info)':'var(--bg2)';
      var htx=we?'var(--tx-err)':tod?'var(--tx-info)':'var(--tx3)';
      var ntx=we?'var(--tx-err)':tod?'var(--tx-info)':'var(--tx)';

      var col=document.createElement('div');
      col.style.cssText='width:'+DW+'px;flex-shrink:0;border-right:.5px solid var(--bd)';

      // Header
      var hdr=document.createElement('div');
      hdr.style.cssText='height:60px;position:sticky;top:0;z-index:5;background:'+hbg+';border-bottom:.5px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer';
      hdr.innerHTML='<span style="font-size:10px;font-weight:600;color:'+htx+'">'+fmtWD(date)+'</span>'+
        '<span style="font-size:20px;font-weight:700;line-height:1;color:'+ntx+'">'+fromISO(date).getDate()+'</span>'+
        '<span style="font-size:9px;color:var(--tx3)">'+fromISO(date).toLocaleDateString('en-US',{month:'short'})+'</span>';
      hdr.addEventListener('click',function(){S.selectedDate=date;setView('day');});
      col.appendChild(hdr);

      // Slots container
      var slotWrap=document.createElement('div');
      slotWrap.style.position='relative';

      SLOTS.forEach(function(s,si){
        var covered=dayEvs.some(function(e){return si>=e.slotIndex&&si<e.slotIndex+e.duration;});
        var oh=s.m===0;
        var cell=document.createElement('div');
        cell.style.cssText='height:'+SH+'px;border-bottom:'+(oh?'0.5px solid var(--bd)':'0.5px dashed var(--bd)')+';'+(we?'background:rgba(254,242,242,.25)':'');
        if(!covered){
          cell.className='slot';cell.dataset.cid=clientId;cell.dataset.si=si;
          cell.innerHTML='<span class="ph">+</span>';
        }
        slotWrap.appendChild(cell);
      });

      dayEvs.forEach(function(ev){
        var ecol=pc(ev.provider);var isC=cf.has(ev.id);
        var es=SLOTS[ev.slotIndex+ev.duration];
        var tr=es?(SLOTS[ev.slotIndex].label+'\u2013'+es.label):'';
        var card=document.createElement('div');
        card.className='ecard';card.dataset.eid=ev.id;card.draggable=true;
        card.style.cssText='top:'+(ev.slotIndex*SH+2)+'px;left:3px;right:3px;height:'+(ev.duration*SH-4)+'px;background:'+ecol+';'+
          (isC?'outline:2.5px solid #E24B4A;outline-offset:1px;':'')+
          (ev.flagged?'outline:2.5px solid #D85A30;outline-offset:1px;':'');
        card.innerHTML='<div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ev.service)+'</div>'+
          (!isMeal(ev.service)?'<div style="font-size:10px;opacity:.85;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ev.provider)+'</div>':'')+
          (ev.duration>=3&&tr?'<div style="font-size:9px;opacity:.6;margin-top:1px">'+esc(tr)+'</div>':'')+
          (ev.flagged?'<div style="position:absolute;top:3px;right:5px;font-size:12px" title="Conflict reported">&#x26A0;&#xFE0F;</div>':'')+
          (isC?'<div style="position:absolute;top:3px;right:'+(ev.flagged?'22':'5')+'px;font-size:10px">&#x26A0;</div>':'');
        slotWrap.appendChild(card);
      });
      col.appendChild(slotWrap);
      wrap.appendChild(col);
    });

    grid.innerHTML='';
    grid.appendChild(wrap);
    attachListeners();
    return;
  }

  // ── All clients: CSS grid table ───────────────────────────────────────────
  var container=document.createElement('div');

  // Header row
  var hdrRow=document.createElement('div');
  hdrRow.style.cssText='display:grid;grid-template-columns:'+NW+'px repeat(7,'+DW+'px);position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1.5px solid var(--bd2)';

  // Corner cell
  var corner=document.createElement('div');
  corner.style.cssText='padding:10px 14px;background:var(--bg2);border-right:.5px solid var(--bd);display:flex;align-items:flex-end';
  corner.innerHTML='<span style="font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em">Client</span>';
  hdrRow.appendChild(corner);

  wk.forEach(function(date){
    var we=isWknd(date),tod=isToday(date);
    var cnt=S.events.filter(function(e){return e.date===date;}).length;
    var cell=document.createElement('div');
    cell.style.cssText='border-left:.5px solid var(--bd);padding:8px 6px;text-align:center;cursor:pointer;'+
      'background:'+(we?'var(--bg-warn)':tod?'var(--bg-info)':'var(--bg2)')+';';
    cell.innerHTML=
      '<div style="font-size:10px;font-weight:600;color:'+(we?'var(--tx-err)':tod?'var(--tx-info)':'var(--tx3)')+'">'+fmtWD(date)+'</div>'+
      '<div style="font-size:20px;font-weight:700;line-height:1.1;color:'+(we?'var(--tx-err)':tod?'var(--tx-info)':'var(--tx)')+'">'+fromISO(date).getDate()+'</div>'+
      '<div style="font-size:9px;color:var(--tx3)">'+fromISO(date).toLocaleDateString('en-US',{month:'short'})+'</div>'+
      (cnt?'<div style="font-size:9px;color:var(--tx3);margin-top:2px">'+cnt+' session'+(cnt>1?'s':'')+'</div>':'');
    cell.addEventListener('click',function(){S.selectedDate=date;setView('day');});
    hdrRow.appendChild(cell);
  });
  container.appendChild(hdrRow);

  // Client rows
  if(!S.clients.length){
    var empty=document.createElement('div');
    empty.style.cssText='padding:40px;text-align:center;color:var(--tx3);font-size:13px';
    empty.textContent='No clients yet. Switch to Day view to add clients.';
    container.appendChild(empty);
  }

  S.clients.forEach(function(client,ci){
    var rbg=ci%2===0?'var(--bg)':'var(--bg2)';
    var wkTotal=S.events.filter(function(e){return e.clientId===client.id&&wk.includes(e.date);}).length;

    var row=document.createElement('div');
    row.style.cssText='display:grid;grid-template-columns:'+NW+'px repeat(7,'+DW+'px);border-bottom:.5px solid var(--bd)';

    // Name cell
    var nameCell=document.createElement('div');
    nameCell.style.cssText='background:'+rbg+';border-right:.5px solid var(--bd);padding:12px 14px;cursor:pointer;display:flex;flex-direction:column;justify-content:center';
    nameCell.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--tx)">'+esc(client.name)+'</div>'+
      '<div style="font-size:9px;color:var(--tx3);margin-top:2px">'+wkTotal+' session'+(wkTotal!==1?'s':'')+' this week</div>';
    nameCell.title='Click to rename';
    nameCell.addEventListener('click',function(){openRenameClient(client.id);});
    row.appendChild(nameCell);

    wk.forEach(function(date){
      var we=isWknd(date),tod=isToday(date);
      var dayEvs=S.events.filter(function(e){return e.date===date&&e.clientId===client.id;}).sort(function(a,b){return a.slotIndex-b.slotIndex;});
      var bg=we?'rgba(254,242,242,.4)':tod?'rgba(239,246,255,.25)':rbg;

      var cell=document.createElement('div');
      cell.style.cssText='border-left:.5px solid var(--bd);background:'+bg+';padding:7px;min-height:64px;vertical-align:top';

      if(!dayEvs.length){
        var addBtn=document.createElement('div');
        addBtn.style.cssText='height:100%;min-height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;border-radius:6px;border:1.5px dashed var(--bd);transition:opacity .15s';
        addBtn.innerHTML='<span style="font-size:22px;color:var(--tx3)">+</span>';
        addBtn.addEventListener('click',function(){S.selectedDate=date;setView('day');});
        cell.addEventListener('mouseenter',function(){addBtn.style.opacity='1';});
        cell.addEventListener('mouseleave',function(){addBtn.style.opacity='0';});
        cell.appendChild(addBtn);
      } else {
        dayEvs.forEach(function(ev){
          var ecol=pc(ev.provider);
          var es=SLOTS[ev.slotIndex+ev.duration];
          var ts=es?(SLOTS[ev.slotIndex].label+'\u2013'+es.label):SLOTS[ev.slotIndex].label;
          var pill=document.createElement('div');
          pill.style.cssText='background:'+ecol+';border-radius:5px;padding:5px 8px;margin-bottom:5px;cursor:pointer;position:relative';
          pill.innerHTML=
            '<div style="font-size:10.5px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ev.service)+'</div>'+
            (!isMeal(ev.service)?'<div style="font-size:9.5px;color:rgba(255,255,255,.9);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ev.provider)+'</div>':'')+
            '<div style="font-size:8.5px;color:rgba(255,255,255,.7);margin-top:1px">'+ts+'</div>'+
            (ev.flagged?'<div style="position:absolute;top:3px;right:5px;font-size:11px" title="Conflict reported">&#x26A0;&#xFE0F;</div>':'');
          pill.addEventListener('click',function(){S.selectedDate=date;openEditModal(ev.id);});
          cell.appendChild(pill);
        });
        var addMore=document.createElement('div');
        addMore.style.cssText='text-align:center;font-size:10px;color:var(--tx3);opacity:.35;cursor:pointer;padding:2px 0';
        addMore.textContent='+ add';
        addMore.addEventListener('click',function(){S.selectedDate=date;setView('day');});
        cell.appendChild(addMore);
      }
      row.appendChild(cell);
    });
    container.appendChild(row);
  });

  // Add client button
  var addRow=document.createElement('div');
  addRow.style.cssText='padding:10px 14px;border-top:.5px solid var(--bd)';
  addRow.innerHTML='<button onclick="startAddC()" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border:.5px dashed var(--bd2);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--tx3);font-size:12px;font-family:var(--f)"><i class="ti ti-plus"></i> Add client</button>';
  container.appendChild(addRow);

  grid.innerHTML='';
  grid.appendChild(container);
}

// ── Day view ───────────────────────────────────────────────────────────────
function renderGrid(){
  var grid=document.getElementById('grid');if(!grid)return;
  var de=S.events.filter(function(e){return e.date===S.selectedDate;}),cf=conflicts(de),fp=S.filterProv,we=isWknd(S.selectedDate);
  var h='';

  // Time column
  h+='<div style="position:sticky;left:0;z-index:10;background:var(--bg);border-right:.5px solid var(--bd);width:72px;flex-shrink:0">';
  h+='<div style="height:52px;position:sticky;top:0;z-index:11;background:var(--bg);border-bottom:.5px solid var(--bd)"></div>';
  SLOTS.forEach(function(s){
    var oh=s.m===0;
    h+='<div style="height:'+SH+'px;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 10px 0 0;font-size:11px;color:'+(oh?'var(--tx2)':'var(--tx3)')+';font-weight:'+(oh?500:400)+';border-bottom:'+(oh?'.5px solid var(--bd)':'.5px dashed var(--bd)')+';">';
    h+=oh?esc(s.label):'<span style="opacity:.5">&middot;30</span>';
    h+='</div>';
  });

  // Client columns
  S.clients.forEach(function(client){
    var ce=de.filter(function(e){return e.clientId===client.id;}),
        actE=fp?ce.filter(function(e){return e.provider===fp;}):ce,
        bgE=fp?ce.filter(function(e){return e.provider!==fp;}):[];
    var sel=S.selClients.has(client.id);
    h+='<div style="width:185px;flex-shrink:0;border-right:.5px solid var(--bd);opacity:'+(sel?1:.45)+';transition:opacity .2s">';
    h+='<div style="position:relative;height:52px;position:sticky;top:0;z-index:5;background:'+(we?'var(--bg-warn)':'var(--bg2)')+';border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;padding:0 36px 0 28px">'+
      '<label style="position:absolute;left:8px;top:50%;transform:translateY(-50%);cursor:pointer"><input type="checkbox" '+(sel?'checked':'')+' onchange="togSel(\''+client.id+'\',this.checked)" onclick="event.stopPropagation()" style="cursor:pointer;accent-color:#7F77DD;width:14px;height:14px"></label>'+
      '<div onclick="openRenameClient(\''+client.id+'\')" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;overflow:hidden;max-width:100%">'+
        '<span style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(client.name)+'</span>'+
        '<span style="font-size:9px;opacity:.4">click to rename</span></div>'+
      '<button onclick="event.stopPropagation();removeClient(\''+client.id+'\')" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);font-size:15px;padding:3px">&#x2715;</button>'+
    '</div>';
    h+='<div style="position:relative">';
    SLOTS.forEach(function(s,si){
      var cov=ce.some(function(e){return si>=e.slotIndex&&si<e.slotIndex+e.duration;});
      var oh=s.m===0,bd='border-bottom:'+(oh?'.5px solid var(--bd)':'.5px dashed var(--bd)');
      if(cov){h+='<div style="height:'+SH+'px;'+bd+'"></div>';}
      else{h+='<div class="slot" data-cid="'+client.id+'" data-si="'+si+'" style="'+bd+';'+(we?'background:rgba(254,242,242,.3)':'')+'"><span class="ph">+</span></div>';}
    });
    bgE.forEach(function(ev){
      h+='<div style="position:absolute;top:'+(ev.slotIndex*SH+2)+'px;left:3px;right:3px;height:'+(ev.duration*SH-4)+'px;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px 8px">'+
        '<span style="font-size:10px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ev.provider)+'</span></div>';
    });
    actE.forEach(function(ev){
      var ecol=pc(ev.provider),isC=cf.has(ev.id);
      var es=SLOTS[ev.slotIndex+ev.duration],tr=es?(SLOTS[ev.slotIndex].label+'\u2013'+es.label):'';
      h+='<div class="ecard" data-eid="'+ev.id+'" draggable="true" style="top:'+(ev.slotIndex*SH+2)+'px;left:3px;right:3px;height:'+(ev.duration*SH-4)+'px;background:'+ecol+';'+
        (isC?'outline:2.5px solid #E24B4A;outline-offset:1px;':'')+
        (ev.flagged?'outline:2.5px solid #D85A30;outline-offset:2px;':'')+'">'+
        '<div style="font-size:11px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ev.service)+'</div>'+
        (!isMeal(ev.service)?'<div style="font-size:10px;opacity:.85;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ev.provider)+'</div>':'')+
        (ev.duration>=3&&tr?'<div style="font-size:9px;opacity:.6;margin-top:2px">'+esc(tr)+'</div>':'')+
        (ev.flagged?'<div style="position:absolute;top:4px;right:5px;font-size:12px" title="Conflict reported">&#x26A0;&#xFE0F;</div>':'')+
        (isC?'<div style="position:absolute;top:4px;right:'+(ev.flagged?'22':'5')+'px;font-size:10px">&#x26A0;</div>':'')+
      '</div>';
    });
    h+='</div></div>';
  });

  // Add client column
  h+='<div style="width:155px;flex-shrink:0;padding:8px">';
  if(S.addingClient){
    h+='<div style="display:flex;flex-direction:column;gap:6px">'+
      '<input type="text" id="nc-i" placeholder="Client name..." onkeydown="if(event.key===\'Enter\')submitAddC()">'+
      '<div style="display:flex;gap:6px">'+
        '<button onclick="submitAddC()" style="flex:1;padding:7px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:12px;font-family:var(--f)">Add</button>'+
        '<button onclick="cancelAddC()" style="padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:12px;font-family:var(--f);color:var(--tx2)">&#x2715;</button>'+
      '</div></div>';
    setTimeout(function(){var i=document.getElementById('nc-i');if(i)i.focus();},50);
  } else {
    h+='<button onclick="startAddC()" style="width:100%;height:52px;display:flex;align-items:center;justify-content:center;gap:8px;border:.5px dashed var(--bd2);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--tx3);font-size:12px;font-family:var(--f)"><i class="ti ti-plus" style="font-size:16px"></i> Add client</button>';
  }
  h+='</div>';
  grid.innerHTML=h;
  attachListeners();
}

function attachListeners(){
  document.querySelectorAll('.ecard').forEach(function(card){
    var wasDrag=false;
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart',function(e){wasDrag=true;S.drag=card.dataset.eid;try{e.dataTransfer.setData('text/plain',S.drag);}catch(x){}e.dataTransfer.effectAllowed='move';e.stopPropagation();});
    card.addEventListener('dragend',function(){S.drag=null;document.querySelectorAll('.drop-target').forEach(function(el){el.classList.remove('drop-target');});setTimeout(function(){wasDrag=false;},80);});
    card.addEventListener('click',function(e){if(wasDrag)return;e.stopPropagation();openEditModal(card.dataset.eid);});
  });
  document.querySelectorAll('.slot').forEach(function(cell){
    cell.addEventListener('click',function(){if(!S.drag)openAddModal(cell.dataset.cid,+cell.dataset.si);});
    cell.addEventListener('dragenter',function(e){e.preventDefault();cell.classList.add('drop-target');});
    cell.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';cell.classList.add('drop-target');});
    cell.addEventListener('dragleave',function(){cell.classList.remove('drop-target');});
    cell.addEventListener('drop',function(e){e.preventDefault();e.stopPropagation();cell.classList.remove('drop-target');if(!S.drag)return;handleDrop(cell.dataset.cid,+cell.dataset.si);});
  });
}
function handleDrop(cid,si){var ev=S.events.find(function(e){return e.id===S.drag;});if(!ev||si+ev.duration>SLOTS.length)return;ev.date=S.selectedDate;ev.clientId=cid;ev.slotIndex=si;S.drag=null;renderAll();saveAll();}
function removeClient(cid){S.clients=S.clients.filter(function(c){return c.id!==cid;});S.events=S.events.filter(function(e){return e.clientId!==cid;});S.selClients.delete(cid);renderAll();saveAll();}

function flagConflict(eid){
  var ev=S.events.find(function(e){return e.id===eid;});if(!ev)return;
  var c=S.clients.find(function(c){return c.id===ev.clientId;});
  showModal(
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'+
    '<div style="width:38px;height:38px;border-radius:50%;background:var(--bg-warn);border:2px solid var(--bd-err);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px">&#x26A0;&#xFE0F;</div>'+
    '<div><div style="font-size:15px;font-weight:600">Report Scheduling Conflict</div>'+
    '<div style="font-size:11px;color:var(--tx3);margin-top:2px">'+esc(ev.service)+' &middot; '+esc(ev.provider)+' &middot; '+SLOTS[ev.slotIndex].label+'</div></div></div>'+
    '<div style="font-size:12px;color:var(--tx2);margin-bottom:10px">Describe why this time does not work:</div>'+
    '<textarea id="cf-note" placeholder="e.g. I have a prior commitment at this time..." style="width:100%;height:80px;padding:8px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;resize:vertical;box-sizing:border-box"></textarea>'+
    '<div style="margin:10px 0 18px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--tx2)">'+
    '<input type="checkbox" id="cf-anon" style="accent-color:#7F77DD;cursor:pointer;width:14px;height:14px"> Submit anonymously</label></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end">'+cBtn()+
    ' <button onclick="submitFlagConflict(\''+eid+'\')" style="padding:8px 20px;border-radius:var(--r);border:none;background:#E24B4A;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Report Conflict</button></div>'
  );
  setTimeout(function(){var t=document.getElementById('cf-note');if(t)t.focus();},50);
}
function submitFlagConflict(eid){
  var note=(document.getElementById('cf-note')&&document.getElementById('cf-note').value||'').trim();
  var anon=document.getElementById('cf-anon')&&document.getElementById('cf-anon').checked||false;
  var ev=S.events.find(function(e){return e.id===eid;});if(!ev)return;
  var c=S.clients.find(function(c){return c.id===ev.clientId;});
  if(!S.flaggedConflicts)S.flaggedConflicts=[];
  S.flaggedConflicts.push({id:nid(),evId:eid,date:ev.date,service:ev.service,provider:ev.provider,client:c?c.name:'',slot:SLOTS[ev.slotIndex].label,note:note,anon:anon,ts:new Date().toISOString()});
  ev.flagged=true;
  saveAll();renderAll();closeModal();
  setTimeout(function(){
    showModal(
      '<div style="text-align:center;padding:16px 0">'+
      '<div style="font-size:40px;margin-bottom:12px">&#x2705;</div>'+
      '<div style="font-size:15px;font-weight:600;margin-bottom:8px">Conflict reported</div>'+
      '<div style="font-size:13px;color:var(--tx2);margin-bottom:20px">The director has been notified. The service now shows a &#x26A0;&#xFE0F; icon until resolved.</div>'+
      '<button onclick="closeModal()" style="padding:9px 28px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Done</button></div>'
    );
  },50);
}
function openConflictLog(){
  var fc=S.flaggedConflicts||[];
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
    '<div style="font-size:15px;font-weight:600">&#x26A0;&#xFE0F; Conflict Reports</div>'+
    (fc.length?'<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg-warn);color:var(--tx-err);border:.5px solid var(--bd-err)">'+fc.length+' open</span>':'')+'</div>';
  if(!fc.length){
    h+='<div style="text-align:center;padding:28px;color:var(--tx3);font-size:13px">No conflicts reported &#x1F44D;</div>';
  } else {
    h+='<div style="max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:16px">';
    fc.slice().reverse().forEach(function(cf){
      h+='<div style="padding:12px 14px;border-radius:var(--r);border:.5px solid var(--bd-err);background:var(--bg-warn)">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">'+
        '<div><div style="font-size:13px;font-weight:600;color:var(--tx)">'+esc(cf.service)+'</div>'+
        '<div style="font-size:11px;color:var(--tx2);margin-top:2px">'+esc(cf.provider)+(cf.client?' &middot; '+esc(cf.client):'')+' &middot; '+esc(cf.slot)+' &middot; '+esc(cf.date)+'</div></div>'+
        '<button onclick="resolveConflict(\''+cf.id+'\')" style="flex-shrink:0;padding:4px 10px;border-radius:var(--r);border:.5px solid var(--bd-ok);background:var(--bg-ok);color:var(--tx-ok);cursor:pointer;font-size:11px;font-family:var(--f)">&#x2713; Resolve</button></div>'+
        (cf.note?'<div style="font-size:12px;color:var(--tx2);padding:8px;background:rgba(0,0,0,.04);border-radius:var(--r)">'+esc(cf.note)+'</div>':'<div style="font-size:11px;color:var(--tx3);font-style:italic">No notes.</div>')+
        '<div style="font-size:10px;color:var(--tx3);margin-top:6px">'+(cf.anon?'Anonymous &bull; ':'')+
        'Reported '+new Date(cf.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})+'</div>'+
      '</div>';
    });
    h+='</div><div style="display:flex;justify-content:space-between;align-items:center">'+
      '<button onclick="if(confirm(\'Clear all conflicts?\'))clearConflicts()" style="font-size:12px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:var(--f)">Clear all</button>'+
      '<button onclick="closeModal()" style="padding:8px 20px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Close</button></div>';
  }
  showModal(h);
}
function resolveConflict(cfid){
  var cf=S.flaggedConflicts.find(function(c){return c.id===cfid;});
  if(cf){var ev=S.events.find(function(e){return e.id===cf.evId;});if(ev)ev.flagged=false;}
  S.flaggedConflicts=S.flaggedConflicts.filter(function(c){return c.id!==cfid;});
  saveAll();renderAll();openConflictLog();
}
function clearConflicts(){S.flaggedConflicts=[];S.events.forEach(function(e){e.flagged=false;});saveAll();renderAll();closeModal();}

    '<div style="border-top:.5px solid var(--bd);padding-top:14px;margin-bottom:16px">'+
    '<div style="font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:8px">Add provider</div>'+
    '<div style="display:flex;gap:8px;align-items:center">'+
    '<input type="color" id="np-col" value="#7F77DD" style="width:36px;height:36px;flex-shrink:0">'+
    '<input type="text" id="np-name" placeholder="Provider name..." onkeydown="if(event.key===\'Enter\')addProvider()" style="flex:1">'+
    '<button onclick="addProvider()" style="padding:7px 16px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-family:var(--f);font-weight:500">+ Add</button>'+
    '</div></div>'+
    '<div style="display:flex;justify-content:flex-end"><button onclick="closeModal()" style="padding:8px 20px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Done</button></div>'
  );
  renderProvList();setTimeout(function(){var el=document.getElementById('np-name');if(el)el.focus();},50);
}
function renderProvList(){
  var el=document.getElementById('plist');if(!el)return;
  var entries=Object.entries(S.providers);
  if(!entries.length){el.innerHTML='<div style="font-size:12px;color:var(--tx3);text-align:center;padding:10px">No providers yet</div>';return;}
  el.innerHTML='';
  entries.forEach(function(entry){
    var name=entry[0],color=entry[1].color;
    var cnt=S.events.filter(function(e){return e.provider===name;}).length;
    var sid='p_'+name.replace(/[^a-z0-9]/gi,'_');
    var row=document.createElement('div');
    row.className='prov-row';
    row.innerHTML=
      '<input type="color" value="'+color+'" style="width:32px;height:32px;flex-shrink:0">'+
      '<input type="text" value="'+esc(name)+'" id="'+sid+'" style="flex:1;border:none;background:transparent;font-size:13px;padding:2px 4px;outline:none;border-bottom:1.5px solid transparent;font-family:var(--f);color:var(--tx)">'+
      '<span style="font-size:10px;color:var(--tx3);white-space:nowrap;flex-shrink:0">'+cnt+' session'+(cnt!==1?'s':'')+'</span>'+
      '<button class="ibtn prov-del" style="color:var(--tx-err);flex-shrink:0"><i class="ti ti-trash" style="font-size:14px"></i></button>';
    row.querySelector('input[type=color]').addEventListener('change',function(){updateProvColor(name,this.value);});
    var nameInp=row.querySelector('input[type=text]');
    nameInp.addEventListener('blur',function(){renameProvider(name,this.value,sid);});
    nameInp.addEventListener('keydown',function(e){if(e.key==='Enter')this.blur();});
    nameInp.addEventListener('focus',function(){this.style.borderBottomColor='#7F77DD';});
    nameInp.addEventListener('blur',function(){this.style.borderBottomColor='transparent';},true);
    row.querySelector('.prov-del').addEventListener('click',function(){deleteProvider(name);});
    el.appendChild(row);
  });
}
function updateProvColor(name,color){if(S.providers[name]){S.providers[name].color=color;renderLegend();renderGrid();saveAll();}}
function renameProvider(old,nw,sid){
  nw=nw.trim();if(!nw||nw===old)return;
  if(S.providers[nw]){alert('"'+nw+'" already exists.');var i=document.getElementById(sid);if(i)i.value=old;return;}
  S.providers[nw]={color:S.providers[old].color};delete S.providers[old];
  S.events.forEach(function(e){if(e.provider===old)e.provider=nw;});
  if(S.filterProv===old)S.filterProv=nw;
  renderAll();saveAll();renderProvList();
}
function deleteProvider(name){
  var cnt=S.events.filter(function(e){return e.provider===name;}).length;
  if(cnt>0){var rm=confirm('"'+name+'" has '+cnt+' session'+(cnt!==1?'s':'')+'. OK = remove provider AND sessions. Cancel = remove from list only.');if(rm)S.events=S.events.filter(function(e){return e.provider!==name;});}
  delete S.providers[name];if(S.filterProv===name)S.filterProv=null;
  renderAll();saveAll();renderProvList();
}
function addProvider(){
  var name=document.getElementById('np-name')&&document.getElementById('np-name').value.trim();
  var color=document.getElementById('np-col')&&document.getElementById('np-col').value||PC[Object.keys(S.providers).length%PC.length];
  if(!name){alert('Please enter a name.');return;}
  if(S.providers[name]){alert('"'+name+'" already exists.');return;}
  S.providers[name]={color:color};
  document.getElementById('np-name').value='';
  document.getElementById('np-col').value=PC[Object.keys(S.providers).length%PC.length];
  saveAll();renderAll();renderProvList();
}

function renderSvcList(){

function togMeal(name,on){

  );

function calcCopy(eid){
  var ev=S.events.find(function(e){return e.id===eid;});if(!ev)return{toCreate:[],skipped:0};
  var sd=[0,1,2,3,4,5,6].filter(function(i){return document.getElementById('cdc-'+i)&&document.getElementById('cdc-'+i).checked;});
  var sc=S.clients.filter(function(c){return document.getElementById('ccc-'+c.id)&&document.getElementById('ccc-'+c.id).checked;}).map(function(c){return c.id;});
  var sw=[0,1,2,3].filter(function(i){return document.getElementById('cwc-'+i)&&document.getElementById('cwc-'+i).checked;});
  var tc=[],sk=0;
  sw.forEach(function(o){var m=addDays(S.weekStart,o*7);sd.forEach(function(di){var td=addDays(m,di);sc.forEach(function(cid){
    if(td===ev.date&&cid===ev.clientId)return;
    var ov=S.events.some(function(e){return e.date===td&&e.clientId===cid&&e.slotIndex<ev.slotIndex+ev.duration&&e.slotIndex+e.duration>ev.slotIndex;});
    var nw=tc.some(function(e){return e.date===td&&e.clientId===cid;});
    if(ov||nw){sk++;return;}
    tc.push({id:nid(),date:td,clientId:cid,slotIndex:ev.slotIndex,duration:ev.duration,service:ev.service,provider:ev.provider,flagged:false});
  });});});
  return{toCreate:tc,skipped:sk};
}
function updCP(eid){
  var p=document.getElementById('cp-prev'),b=document.getElementById('cp-btn');if(!p)return;
  var r=calcCopy(eid);
  if(!r.toCreate.length&&!r.skipped){p.innerHTML='<i class="ti ti-info-circle" style="font-size:13px;color:var(--tx3)"></i> Select at least one day, client, and week.';if(b){b.disabled=true;b.textContent='Copy';}}
  else if(!r.toCreate.length){p.innerHTML='<i class="ti ti-alert-circle" style="font-size:13px"></i> All slots already occupied.';if(b){b.disabled=true;b.textContent='Copy';}}
  else{p.innerHTML='<i class="ti ti-check" style="font-size:13px;color:var(--tx-ok)"></i> <strong>'+r.toCreate.length+' new session'+(r.toCreate.length>1?'s':'')+'</strong> will be created'+(r.skipped?' <span style="color:var(--tx3)">\u00b7 '+r.skipped+' skipped</span>':'');if(b){b.disabled=false;b.textContent='Copy '+r.toCreate.length+' session'+(r.toCreate.length>1?'s':'');}}
}
function execCopy(eid){var r=calcCopy(eid);if(!r.toCreate.length)return;r.toCreate.forEach(function(e){S.events.push(e);});renderAll();saveAll();closeModal();}

// ── Export: PDF ────────────────────────────────────────────────────────────
function exportToPDF(){
  if(typeof window.jspdf==='undefined'){alert('PDF loading, try again.');return;}
  var btn=document.getElementById('pdf-btn');if(btn){btn.innerHTML='...';btn.disabled=true;}
  try{
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    var pW=297,mg=12,uW=pW-2*mg;
    try{doc.addImage(LOGO_PDF_DATA,'PNG',mg,4,50,22,'','FAST');}catch(e){}
    doc.setDrawColor(203,213,225);doc.setLineWidth(0.3);doc.line(mg+54,5,mg+54,26);
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(15,23,42);doc.text(S.title,mg+58,14);
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(100,116,139);
    doc.text('Generated '+new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),mg+58,21);
    var lx=mg+58,ly=28;
    Object.entries(S.providers).forEach(function(entry){var name=entry[0],color=entry[1].color;var rc=rgb(color);doc.setFillColor(rc[0],rc[1],rc[2]);doc.roundedRect(lx,ly-2.5,3,3,.5,.5,'F');doc.setFontSize(8);doc.setTextColor(71,85,105);doc.text(name,lx+5,ly);lx+=doc.getTextWidth(name)+12;if(lx>pW-mg-30){lx=mg+58;ly+=5;}});
    var y=ly+8;
    var allDates=[...new Set(S.events.map(function(e){return e.date;}))].sort();
    allDates.forEach(function(date){
      var de=S.events.filter(function(e){return e.date===date;});if(!de.length)return;
      var cf=conflicts(de);
      var minSi=Math.max(0,Math.min.apply(null,de.map(function(e){return e.slotIndex;}))-1);
      var maxSi=Math.min(SLOTS.length,Math.max.apply(null,de.map(function(e){return e.slotIndex+e.duration;}))+1);
      var estH=(maxSi-minSi)*6.5+14;
      if(y+estH>195){doc.addPage();y=14;}
      doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(15,23,42);doc.text(fmtFull(date),mg,y);y+=4;
      var tW=20,cW=(uW-tW)/Math.max(S.clients.length,1);
      var head=[[{content:'Time',styles:{halign:'right',fontStyle:'bold'}}].concat(S.clients.map(function(c){return {content:c.name,styles:{halign:'center',fontStyle:'bold'}};}))];
      var body=[];
      for(var si=minSi;si<maxSi;si++){
        var slot=SLOTS[si];
        var row=[{content:slot.label,styles:{fontSize:6.5,halign:'right',textColor:slot.m===0?[50,65,92]:[148,163,184],cellPadding:{top:1,right:4,bottom:1,left:2}}}];
        S.clients.forEach(function(client){
          var ev=de.find(function(e){return e.clientId===client.id&&e.slotIndex===si;});
          var cEv=de.find(function(e){return e.clientId===client.id&&si>e.slotIndex&&si<e.slotIndex+e.duration;});
          if(ev){var rc=rgb(pc(ev.provider));row.push({content:ev.service+(ev.flagged?'\n\u26A0 Conflict':''),styles:{fillColor:[rc[0],rc[1],rc[2]],textColor:[255,255,255],fontSize:6.5,fontStyle:'bold',cellPadding:2}});}
          else if(cEv){var rc2=rgb(pc(cEv.provider));row.push({content:'',styles:{fillColor:[rc2[0],rc2[1],rc2[2]],lineWidth:0}});}
          else row.push({content:'',styles:{fillColor:[255,255,255]}});
        });
        body.push(row);
      }
      doc.autoTable({head:head,body:body,startY:y,styles:{fontSize:7,cellPadding:1.5,lineColor:[226,232,240],lineWidth:.2,overflow:'linebreak'},headStyles:{fillColor:[30,41,59],textColor:[255,255,255],fontSize:8,halign:'center',cellPadding:3},columnStyles:Object.assign({0:{cellWidth:tW}},Object.fromEntries(S.clients.map(function(_,i){return[i+1,{cellWidth:cW}];}))),margin:{left:mg,right:mg}});
      y=doc.lastAutoTable.finalY+10;
    });
    var pages=doc.getNumberOfPages();
    for(var i=1;i<=pages;i++){doc.setPage(i);doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(148,163,184);doc.text(S.title+' \u00b7 Page '+i+' of '+pages,pW/2,205,{align:'center'});}
    doc.save(S.title.replace(/[^a-z0-9]/gi,'_')+'.pdf');
  }catch(err){console.error(err);alert('PDF failed: '+err.message);}
  finally{if(btn){btn.innerHTML='<i class="ti ti-file-type-pdf"></i> PDF';btn.disabled=false;}}
}

    var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>'+S.title+'</title><style>@page{margin:.9in 1.1in .9in 1.1in;}body{font-family:"Roboto","Calibri",sans-serif;font-size:11pt;color:#111827;margin:.9in 1.1in;}p{margin:0;font-family:"Roboto","Calibri",sans-serif;}table{border-collapse:collapse;font-family:"Roboto","Calibri",sans-serif;}</style></head><body>'+pages+'</body></html>';
    var blob=new Blob(['\ufeff'+html],{type:'application/msword'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='Schedule_'+S.selectedDate.replace(/-/g,'')+'.doc';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }catch(err){alert('Word export failed: '+err.message);}
  finally{if(btn){btn.innerHTML='<i class="ti ti-file-type-doc"></i> Daily Client Schedule';btn.disabled=false;}}
}
