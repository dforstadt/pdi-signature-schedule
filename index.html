<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDI/Signature Schedule</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root{--bg:#fff;--bg2:#f8fafc;--bg-info:#eff6ff;--bg-ok:#f0fdf4;--bg-warn:#fef2f2;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--tx-info:#1d4ed8;--tx-ok:#15803d;--tx-err:#b91c1c;--bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.16);--bd-info:#bfdbfe;--bd-ok:#bbf7d0;--bd-err:#fecaca;--r:8px;--rl:12px;--f:'Plus Jakarta Sans',-apple-system,sans-serif;}
    @media(prefers-color-scheme:dark){:root{--bg:#1e293b;--bg2:#0f172a;--bg-info:#1e3a5f;--bg-ok:#052e16;--bg-warn:#450a0a;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;--tx-info:#93c5fd;--tx-ok:#86efac;--tx-err:#fca5a5;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.16);--bd-info:rgba(147,197,253,.3);--bd-ok:rgba(134,239,172,.3);--bd-err:rgba(252,165,165,.3);}}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--f);background:var(--bg2);color:var(--tx);padding:18px;min-height:100vh;}
    #app{max-width:1800px;margin:0 auto;}
    .card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
    .btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);border:.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:13px;color:var(--tx2);font-family:var(--f);white-space:nowrap;transition:background .12s;}
    .btn:hover{background:var(--bg2);}.btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn.grn{background:var(--bg-ok);border-color:var(--bd-ok);color:var(--tx-ok);}
    .btn.nav{font-size:18px;line-height:1;padding:5px 10px;}
    .ibtn{background:none;border:none;cursor:pointer;padding:4px;border-radius:var(--r);color:var(--tx3);display:flex;align-items:center;font-family:var(--f);}
    .ibtn:hover{background:var(--bg2);color:var(--tx);}
    .day-tab{display:flex;flex-direction:column;align-items:center;padding:6px 11px;border-radius:var(--r);border:.5px solid var(--bd);background:transparent;cursor:pointer;font-family:var(--f);transition:all .15s;gap:2px;min-width:54px;}
    .day-tab:hover:not(.active){background:var(--bg2);}.day-tab.active{background:var(--bg-info);border-color:var(--bd-info);}
    .day-tab.active .dn,.day-tab.active .dd,.day-tab.active .dm,.day-tab.active .dc{color:var(--tx-info);}
    .day-tab.wknd .dn,.day-tab.wknd .dd,.day-tab.wknd .dm{color:var(--tx-err);}
    .day-tab.tday .dn,.day-tab.tday .dd,.day-tab.tday .dm{color:var(--tx-info);}
    .dn{font-size:10px;font-weight:500;color:var(--tx3);}.dd{font-size:14px;font-weight:600;color:var(--tx2);line-height:1;}.dm{font-size:9px;color:var(--tx3);line-height:1;}.dc{font-size:9px;color:var(--tx3);}
    .tdot{width:4px;height:4px;border-radius:50%;background:var(--tx-info);margin-top:1px;}
    .lpill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:1.5px solid transparent;transition:all .15s;font-size:12px;color:var(--tx2);}
    .lpill:hover{background:var(--bg2);}.lpill.dim{opacity:.3;}
    select,input[type=text],input[type=password],textarea{box-sizing:border-box;width:100%;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;}
    select:focus,input[type=text]:focus,input[type=password]:focus,textarea:focus{outline:2px solid #7F77DD;outline-offset:1px;border-color:#7F77DD;}
    input[type=color]{cursor:pointer;border:.5px solid var(--bd2);border-radius:6px;padding:2px;background:none;}
    input[type=date]{box-sizing:border-box;width:100%;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;}
    #grid-wrap{border:.5px solid var(--bd);border-radius:var(--rl);overflow:auto;max-height:62vh;background:var(--bg);}
    #grid{display:flex;min-width:max-content;}
    .slot{height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .slot:hover{background:var(--bg2);}.slot:hover .ph{opacity:1;}
    .slot .ph{opacity:0;transition:opacity .15s;color:var(--tx3);font-size:20px;pointer-events:none;}
    .drop-target{background:var(--bg-info)!important;}
    .ecard{position:absolute;border-radius:var(--r);padding:6px 8px;color:#fff!important;overflow:hidden;z-index:2;user-select:none;cursor:grab;transition:filter .12s,transform .12s;}
    .ecard:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .prov-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bd);margin-bottom:6px;background:var(--bg);}
    .svc-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd);margin-bottom:5px;background:var(--bg);}
    .copy-dp{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 8px;border-radius:var(--r);border:1.5px solid var(--bd);cursor:pointer;transition:all .15s;min-width:40px;user-select:none;}
    .copy-dp.on{border-color:#7F77DD;background:#7F77DD18;}.copy-dp.we{color:var(--tx-err);}
    .copy-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd);cursor:pointer;transition:background .1s;}
    .copy-row:hover{background:var(--bg2);}.copy-row.on{border-color:#7f77dd55;background:#7f77dd08;}
    #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding-top:60px;overflow-y:auto;}
    #mbox{background:var(--bg);border-radius:var(--rl);padding:24px;width:460px;border:.5px solid var(--bd);max-height:85vh;overflow-y:auto;}
    @keyframes pu{0%,100%{opacity:1}50%{opacity:.25}}.pul{animation:pu 2s infinite;}
    @keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

  var _ap=_h>=12?'PM':'AM', _hh=_h>12?_h-12:_h;
  SLOTS.push({label:_hh+':00 '+_ap,m:0});
  SLOTS.push({label:_hh+':30 '+_ap,m:30});
}

// ── Date utils ─────────────────────────────────────────────────────────────
function toISO(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
function fromISO(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(iso,n){var d=fromISO(iso);d.setDate(d.getDate()+n);return toISO(d);}
function getMon(date){var d=new Date(date),day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return toISO(d);}
function todayISO(){return toISO(new Date());}
function weekDates(m){return[0,1,2,3,4,5,6].map(function(i){return addDays(m,i);});}
function isWknd(iso){var d=fromISO(iso).getDay();return d===0||d===6;}
function isToday(iso){return iso===todayISO();}
function fmtWD(iso){return fromISO(iso).toLocaleDateString('en-US',{weekday:'short'});}
function fmtS(iso){return fromISO(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtFull(iso){return fromISO(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function fmtRange(m){var d=weekDates(m);return fmtS(d[0])+'\u2013'+fromISO(d[6]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

// ── State ──────────────────────────────────────────────────────────────────
var TODAY=todayISO(), MON=getMon(new Date());
var S={
  title:'PDI/Signature Schedule',
  subtitle:'Click a slot to add \u00b7 drag to move \u00b7 click event to edit',
  clients:[], events:[], providers:{}, services:[],
  mealServices:[], flaggedConflicts:[],
  weekStart:MON, selectedDate:TODAY,
  selClients:new Set(), drag:null, addingClient:false,
  filterProv:null, viewMode:'day', weekClient:'all'
};

var _uid=100;
function nid(){return 'i'+(++_uid)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rgb(hex){var h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function pc(name){return(S.providers[name]&&S.providers[name].color)||'#888';}
function mkProv(name){if(name&&!S.providers[name])S.providers[name]={color:PC[Object.keys(S.providers).length%PC.length],type:'session'};}
function isMeal(svc){return S.mealServices.indexOf(svc)>-1;}
function noStipend(prov){var p=S.providers[prov];if(!p)return false;var st=p.stipendType;if(st)return st==='none';return!!p.noStipend;}
function isPDIWeekly(prov){var p=S.providers[prov];return!!(p&&(p.stipendType==='pdi_weekly'||p.type==='weekly'));}
function provType(prov){var p=S.providers[prov];if(!p)return 'session';var st=p.stipendType;if(st==='pdi_weekly')return 'weekly';return p.type||'session';}

function conflicts(evs){
  var ids=new Set();
  for(var i=0;i<evs.length;i++){
    for(var j=i+1;j<evs.length;j++){
      var a=evs[i],b=evs[j];
      if(isMeal(a.service)||isMeal(b.service))continue;
      if(a.provider===b.provider&&a.slotIndex<b.slotIndex+b.duration&&a.slotIndex+a.duration>b.slotIndex){
        ids.add(a.id);ids.add(b.id);
      }
    }
  }
  return ids;
}

// ── Undo ───────────────────────────────────────────────────────────────────
var _undoStack=[];
var _lastSaveTs=0;
function pushUndo(){
  _undoStack.push(getBlob());
  if(_undoStack.length>20)_undoStack.shift();
  renderUndoBtn();
}
function undo(){
  if(!_undoStack.length)return;
  var prev=_undoStack.pop();
  try{
    var d=JSON.parse(prev);
    if(applyData(d)){
      var blob=getBlob();
      try{localStorage.setItem(LS_KEY,blob);}catch(e){}
      var ts=Date.now();_lastSaveTs=ts;
      try{FB.set({blob:blob,ts:ts}).catch(function(){});}catch(e){}
      renderAll();renderUndoBtn();
      showUndoToast();
    }
  }catch(e){console.error('Undo:',e);}
}
function renderUndoBtn(){
  var btn=document.getElementById('undo-btn');if(!btn)return;
  btn.disabled=_undoStack.length===0;
  btn.style.opacity=_undoStack.length===0?'0.35':'1';
}
function showUndoToast(){
  var t=document.getElementById('undo-toast');if(!t)return;
  t.style.opacity='1';t.style.transform='translateY(0)';
  clearTimeout(t._hide);
  t._hide=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(8px)';},2200);
}

// ── Save / Load ────────────────────────────────────────────────────────────
var LS_KEY='pdi_sched_v1';
function getBlob(){
  return JSON.stringify({
    clients:S.clients,events:S.events,providers:S.providers,
    services:S.services,mealServices:S.mealServices,
    flaggedConflicts:S.flaggedConflicts,title:S.title,subtitle:S.subtitle
  });
}
function applyData(d){
  try{
    if(Array.isArray(d.clients)){S.clients=d.clients;S.selClients=new Set(d.clients.map(function(c){return c.id;}));}
    if(Array.isArray(d.events))S.events=d.events;
    if(d.providers&&typeof d.providers==='object'&&!Array.isArray(d.providers))S.providers=d.providers;
    if(Array.isArray(d.services))S.services=d.services;
    if(Array.isArray(d.mealServices))S.mealServices=d.mealServices;
    if(Array.isArray(d.flaggedConflicts))S.flaggedConflicts=d.flaggedConflicts;
    if(d.title)S.title=d.title;
    if(typeof d.subtitle==='string')S.subtitle=d.subtitle;
    return true;
  }catch(e){console.error('applyData:',e);return false;}
}
function saveAll(skipUndo){
  if(!skipUndo)pushUndo();
  var blob=getBlob();
  try{localStorage.setItem(LS_KEY,blob);}catch(e){}
  showSaveStatus();
  var ts=Date.now();_lastSaveTs=ts;
  try{FB.set({blob:blob,ts:ts}).catch(function(){});}catch(e){}
}
function showSaveStatus(){
  var el=document.getElementById('save-status');if(!el)return;
  el.textContent='Saved \u2713';el.style.color='var(--tx-ok)';
  clearTimeout(el._t);el._t=setTimeout(function(){el.textContent='';},2500);
}
(function initLoad(){
  try{var local=localStorage.getItem(LS_KEY);if(local){var d=JSON.parse(local);if(applyData(d)){renderAll();}}}catch(e){}
  setLive(false);
  FB.on('value',function(snap){
    var raw=snap.val();
    if(raw&&raw.blob){
      try{
        var ts=raw.ts||0;
        if(ts>0&&ts===_lastSaveTs){setLive(true);return;}
        var d=JSON.parse(raw.blob);
        if(applyData(d)){try{localStorage.setItem(LS_KEY,raw.blob);}catch(e){}renderAll();}
      }catch(e){console.error('Sync:',e);}
    }
    setLive(true);
  },function(err){console.error('FB:',err);setLive(false);});
})();
function setLive(ok){
  var d=document.getElementById('ldot'),l=document.getElementById('llbl');
  if(d)d.style.background=ok?'#1D9E75':'#E24B4A';
  if(l)l.textContent=ok?'Live':'Offline';
}

// ── Navigation ─────────────────────────────────────────────────────────────
function shiftWeek(dir){
  S.weekStart=addDays(S.weekStart,dir*7);
  var wk=weekDates(S.weekStart),wd=fromISO(S.selectedDate).getDay();
  S.selectedDate=wk[wd===0?6:wd-1];
  renderAll();
}
function goToday(){S.weekStart=getMon(new Date());S.selectedDate=todayISO();renderAll();}
function selDate(d){S.selectedDate=d;renderAll();}
function togFilter(n){S.filterProv=S.filterProv===n?null:n;renderAll();}
function clearFilter(){S.filterProv=null;renderAll();}
function togSel(id,on){on?S.selClients.add(id):S.selClients.delete(id);renderSelBar();renderBadge();}
function setView(mode){
  S.viewMode=mode;
  var bd=document.getElementById('btn-day'),bw=document.getElementById('btn-week');
  if(bd){bd.style.background=mode==='day'?'#7F77DD':'transparent';bd.style.color=mode==='day'?'#fff':'var(--tx2)';}
  if(bw){bw.style.background=mode==='week'?'#7F77DD':'transparent';bw.style.color=mode==='week'?'#fff':'var(--tx2)';}
  var wcs=document.getElementById('week-client-selector');
  if(wcs)wcs.style.display=mode==='week'?'flex':'none';
  if(mode==='week')populateWeekClientSelect();
  renderAll();
}
function populateWeekClientSelect(){
  var sel=document.getElementById('week-client-select');if(!sel)return;
  var cur=S.weekClient||'all';
  sel.innerHTML='<option value="all">All Clients</option>'+
    S.clients.map(function(c){return '<option value="'+c.id+'"'+(c.id===cur?' selected':'')+'>'+esc(c.name)+'</option>';}).join('');
  if(cur&&cur!=='all')sel.value=cur;
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
var mCtx=null;
function showModal(html){
  var mbox=document.getElementById('mbox');
  var modal=document.getElementById('modal');
  if(!mbox||!modal)return;
  mbox.innerHTML=html;
  modal.style.display='flex';
}
function deleteProvider(name){
  if(!name){alert('Provider not found.');return;}
  if(!S.providers[name]){alert('"'+name+'" not found in providers.');buildProvModal();return;}
  var cnt=S.events.filter(function(e){return e.provider===name;}).length;
  var msg=cnt>0?
    'Remove "'+name+'"? They have '+cnt+' session'+(cnt!==1?'s':'')+'. This will also remove their sessions.':
    'Remove "'+name+'" from providers?';
  if(!confirm(msg))return;
  if(cnt>0)S.events=S.events.filter(function(e){return e.provider!==name;});
  delete S.providers[name];
  if(S.filterProv===name)S.filterProv=null;
  renderAll();saveAll();
  // Rebuild modal after deletion
  setTimeout(function(){buildProvModal();},50);
}

function closeModal(){
  var modal=document.getElementById('modal');
  if(modal)modal.style.display='none';
  mCtx=null;
}
document.addEventListener('DOMContentLoaded',function(){
  var modal=document.getElementById('modal');
  if(modal)modal.addEventListener('click',function(e){if(e.target.id==='modal')closeModal();});
});

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll(){
  renderHdr();renderWeekNav();renderDayTabs();renderCBar();
  renderLegend();renderFBar();renderSelBar();renderBadge();
  renderConflictBtn();renderUndoBtn();
  if(S.viewMode==='week')renderWeekGrid();else renderGrid();
}
function renderHdr(){
  var t=document.getElementById('app-title'),s=document.getElementById('app-subtitle');
  if(t)t.textContent=S.title;if(s)s.textContent=S.subtitle;
}
function renderWeekNav(){
  var el=document.getElementById('week-label');if(el)el.textContent=fmtRange(S.weekStart);
  var tb=document.getElementById('today-btn');
  if(tb){var ic=S.weekStart===getMon(new Date())&&S.selectedDate===todayISO();tb.style.opacity=ic?'.4':'1';tb.style.pointerEvents=ic?'none':'auto';}
}
function renderDayTabs(){
  var el=document.getElementById('day-tabs');if(!el)return;
  var wk=weekDates(S.weekStart);
  el.innerHTML=wk.map(function(date){
    var sel=date===S.selectedDate,tod=isToday(date),we=isWknd(date);
    var cnt=S.events.filter(function(e){return e.date===date;}).length;
    return '<button class="day-tab'+(sel?' active':'')+(tod?' tday':'')+(we?' wknd':'')+'" onclick="selDate(\''+date+'\')" title="'+fmtFull(date)+'">'+
      '<span class="dn">'+fmtWD(date)+'</span>'+
      '<span class="dd">'+fromISO(date).getDate()+'</span>'+
      '<span class="dm">'+fromISO(date).toLocaleDateString('en-US',{month:'short'})+'</span>'+
      (tod?'<div class="tdot"></div>':'')+
      '<span class="dc">'+(cnt?cnt+' session'+(cnt>1?'s':''):' ')+'</span></button>';
  }).join('');
}
function renderCBar(){
  var bar=document.getElementById('cbar');if(!bar)return;
  var de=S.events.filter(function(e){return e.date===S.selectedDate;}),cf=conflicts(de);
  if(!cf.size){bar.style.display='none';return;}
  var pm={};
  de.filter(function(e){return cf.has(e.id);}).forEach(function(e){if(!pm[e.provider])pm[e.provider]=[];pm[e.provider].push(e);});
  bar.innerHTML='<i class="ti ti-alert-triangle" style="font-size:14px;vertical-align:-2px;margin-right:6px"></i><strong>Double-booking:</strong> '+
    Object.keys(pm).map(function(p){return '<span style="display:inline-flex;align-items:center;gap:5px;margin:2px 4px;padding:2px 8px;border-radius:var(--r);background:rgba(255,255,255,.15)"><span style="width:8px;height:8px;border-radius:50%;background:'+pc(p)+';display:inline-block"></span>'+esc(p)+'</span>';}).join('');
  bar.style.display='block';
}
function renderLegend(){
  var el=document.getElementById('legend');if(!el)return;
  var de=S.events.filter(function(e){return e.date===S.selectedDate;}),cf=conflicts(de);
  var cp=new Set(de.filter(function(e){return cf.has(e.id);}).map(function(e){return e.provider;}));
  var fp=S.filterProv,wk=weekDates(S.weekStart);
  var entries=Object.entries(S.providers);
  if(!entries.length){el.innerHTML='<span style="font-size:12px;color:var(--tx3)">No providers \u2014 click Manage to add</span>';return;}
  el.innerHTML=entries.map(function(entry){
    var n=entry[0],color=entry[1].color;
    var isA=fp===n,isD=fp&&fp!==n;
    var wkC=S.events.filter(function(e){return e.provider===n&&wk.includes(e.date);}).length;
    return '<div class="lpill'+(isD?' dim':'')+'" style="border-color:'+(isA?color:'transparent')+';background:'+(isA?color+'18':'transparent')+'">'+
      '<div onclick="togFilter(\''+esc(n)+'\')" style="display:flex;align-items:center;gap:6px;flex:1;cursor:pointer">'+
        '<div style="width:9px;height:9px;border-radius:2px;background:'+color+';flex-shrink:0"></div>'+
        '<span style="color:'+(cp.has(n)?'var(--tx-err)':isA?color:'var(--tx2)')+'">'+esc(n)+'</span>'+
        '<span style="font-size:10px;color:var(--tx3)">'+wkC+' this wk</span>'+
        (cp.has(n)?'<i class="ti ti-alert-triangle" style="font-size:10px"></i>':'')+
        (isA?'<i class="ti ti-check" style="font-size:10px;color:'+color+'"></i>':'')+
      '</div>'+
      '<button onclick="event.stopPropagation();openProviderRoster(\''+esc(n)+'\')" title="View my weekly schedule" style="background:none;border:none;cursor:pointer;font-size:12px;padding:2px 4px;opacity:.55;color:var(--tx2)" >&#x1F4CB;</button>'+
    '</div>';
  }).join('');

// ── Week view ──────────────────────────────────────────────────────────────
function renderWeekGrid(){
  var grid=document.getElementById('grid');if(!grid)return;
  populateWeekClientSelect();
  var wk=weekDates(S.weekStart);
  var clientId=(S.weekClient&&S.weekClient!=='all')?S.weekClient:null;
  var NW=168,DW=138;

  if(clientId){
    var client=S.clients.find(function(c){return c.id===clientId;});
    if(!client){grid.innerHTML='<div style="padding:20px;color:var(--tx3)">Client not found.</div>';return;}
    var wrap=document.createElement('div');wrap.style.cssText='display:flex;min-width:max-content';
    var timeCol=document.createElement('div');
    timeCol.style.cssText='width:72px;flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--bg);border-right:.5px solid var(--bd)';
    var timeHdr=document.createElement('div');
    timeHdr.style.cssText='height:60px;position:sticky;top:0;z-index:11;background:var(--bg2);border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;padding:4px';
    timeHdr.innerHTML='<span style="font-size:11px;font-weight:600;color:var(--tx2);text-align:center">'+esc(client.name)+'</span>';
    timeCol.appendChild(timeHdr);
    SLOTS.forEach(function(s){
      var oh=s.m===0;var cell=document.createElement('div');
      cell.style.cssText='height:'+SH+'px;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 8px 0 0;font-size:11px;color:'+(oh?'var(--tx2)':'var(--tx3)')+';font-weight:'+(oh?600:400)+';border-bottom:'+(oh?'0.5px solid var(--bd)':'0.5px dashed var(--bd)')+';';
      cell.innerHTML=oh?esc(s.label):'<span style="opacity:.4">&middot;30</span>';
      timeCol.appendChild(cell);
    });
    wrap.appendChild(timeCol);
    wk.forEach(function(date){
      var we=isWknd(date),tod=isToday(date);
      var dayEvs=S.events.filter(function(e){return e.date===date&&e.clientId===clientId;});
      var cf=conflicts(dayEvs);
      var hbg=we?'var(--bg-warn)':tod?'var(--bg-info)':'var(--bg2)';

function statusIcon(ev){
  if(ev.status==='completed')return' \u2705';
  if(ev.status==='cancelled')return' \u274C';
  if(ev.status==='rescheduled')return' \uD83D\uDD04';
  return'';
}
function statusOverlay(ev){
  if(ev.status==='completed')return'<div style="position:absolute;inset:0;background:rgba(0,0,0,.18);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none">\u2705</div>';
  if(ev.status==='cancelled')return'<div style="position:absolute;inset:0;background:rgba(0,0,0,.35);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none">\u274C</div>';
  if(ev.status==='rescheduled')return'<div style="position:absolute;inset:0;background:rgba(0,0,0,.2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none">\uD83D\uDD04</div>';
  if(ev.flagged)return'<div style="position:absolute;top:3px;right:5px;font-size:12px">\u26A0\uFE0F</div>';
  return'';
}

function handleSlotClick(cell){
  if(S.drag)return;
  var cid=cell.dataset.cid, si=+cell.dataset.si;
  mCtx={type:'add',cid:cid,si:si};
  showModal(
    '<div style="font-size:15px;font-weight:500;margin-bottom:4px">Add service</div>'+
    '<div style="font-size:11px;color:var(--tx3);margin-bottom:18px">'+fmtFull(S.selectedDate)+'</div>'+
    svcFld()+''+prvFld('')+''+durFld(2)+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">'+cBtn()+
    ' <button id="add-svc-btn" style="padding:8px 18px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Add service</button></div>'
  );
  setTimeout(function(){
    var btn=document.getElementById('add-svc-btn');
    if(btn)btn.addEventListener('click',function(){
      var svc=document.getElementById('ms')&&document.getElementById('ms').value.trim();
      var prov=(document.getElementById('mp')&&document.getElementById('mp').value||'').trim();
      var dur=+(document.getElementById('md')&&document.getElementById('md').value)||2;
      if(!svc){alert('Please enter a service name.');return;}
      if(!isMeal(svc)&&!prov){alert('Please select a provider.');return;}
      mkProv(prov);
      S.events.push({id:nid(),date:S.selectedDate,clientId:mCtx.cid,slotIndex:mCtx.si,
        duration:dur,service:svc,provider:prov,flagged:false,status:'scheduled',statusNote:''});
      renderAll();saveAll();closeModal();
    });
    var ms=document.getElementById('ms');if(ms)ms.focus();
  },30);
}
function attachListeners(){
  document.querySelectorAll('.ecard').forEach(function(card){
    var wasDrag=false;card.setAttribute('draggable','true');
    card.addEventListener('dragstart',function(e){wasDrag=true;S.drag=card.dataset.eid;try{e.dataTransfer.setData('text/plain',S.drag);}catch(x){}e.dataTransfer.effectAllowed='move';e.stopPropagation();});
    card.addEventListener('dragend',function(){S.drag=null;document.querySelectorAll('.drop-target').forEach(function(el){el.classList.remove('drop-target');});setTimeout(function(){wasDrag=false;},80);});
    card.addEventListener('click',function(e){if(wasDrag)return;e.stopPropagation();openEditModal(card.dataset.eid);});
  });
  document.querySelectorAll('.slot').forEach(function(cell){
    cell.addEventListener('dragenter',function(e){e.preventDefault();cell.classList.add('drop-target');});
    cell.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';cell.classList.add('drop-target');});
    cell.addEventListener('dragleave',function(){cell.classList.remove('drop-target');});
    cell.addEventListener('drop',function(e){e.preventDefault();e.stopPropagation();cell.classList.remove('drop-target');if(!S.drag)return;handleDrop(cell.dataset.cid,+cell.dataset.si);});
  });
}
function handleDrop(cid,si){var ev=S.events.find(function(e){return e.id===S.drag;});if(!ev||si+ev.duration>SLOTS.length)return;ev.date=S.selectedDate;ev.clientId=cid;ev.slotIndex=si;S.drag=null;renderAll();saveAll();}

function setStatus(val){
  var grp=document.getElementById('status-btns');

  grp.dataset.status=val;
  var colors={scheduled:'#7F77DD',completed:'#1D9E75',cancelled:'#E24B4A',rescheduled:'#D85A30'};
  grp.querySelectorAll('button[data-st]').forEach(function(btn){
    var st=btn.dataset.st,on=st===val,c=colors[st];
    btn.style.borderColor=on?c:'var(--bd)';
    btn.style.background=on?(c+'18'):'transparent';
    btn.style.color=on?c:'var(--tx3)';
  });
  var noteWrap=document.getElementById('status-note-wrap');
  if(noteWrap)noteWrap.style.display=(val==='cancelled'||val==='rescheduled')?'block':'none';

function flagConflict(eid){
  var ev=S.events.find(function(e){return e.id===eid;});if(!ev)return;
  var c=S.clients.find(function(c){return c.id===ev.clientId;});
  showModal(
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'+
    '<div style="width:38px;height:38px;border-radius:50%;background:var(--bg-warn);border:2px solid var(--bd-err);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px">&#x26A0;&#xFE0F;</div>'+
    '<div><div style="font-size:15px;font-weight:600">Report Scheduling Conflict</div>'+
    '<div style="font-size:11px;color:var(--tx3);margin-top:2px">'+esc(ev.service)+' &middot; '+esc(ev.provider)+' &middot; '+SLOTS[ev.slotIndex].label+'</div></div></div>'+
    '<div style="font-size:12px;color:var(--tx2);margin-bottom:10px">Describe why this time does not work:</div>'+
    '<textarea id="cf-note" placeholder="e.g. I have a prior commitment at this time..." style="width:100%;height:80px;padding:8px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;resize:vertical;box-sizing:border-box"></textarea>'+
    '<div style="margin:10px 0 18px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--tx2)">'+
    '<input type="checkbox" id="cf-anon" style="accent-color:#7F77DD;cursor:pointer;width:14px;height:14px"> Submit anonymously</label></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end">'+cBtn()+
    ' <button onclick="submitFlagConflict(\''+eid+'\')" style="padding:8px 20px;border-radius:var(--r);border:none;background:#E24B4A;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Report Conflict</button></div>'
  );
  setTimeout(function(){var t=document.getElementById('cf-note');if(t)t.focus();},50);
}
function submitFlagConflict(eid){
  var note=(document.getElementById('cf-note')&&document.getElementById('cf-note').value||'').trim();
  var anon=document.getElementById('cf-anon')&&document.getElementById('cf-anon').checked||false;
  var ev=S.events.find(function(e){return e.id===eid;});if(!ev)return;
  var c=S.clients.find(function(c){return c.id===ev.clientId;});
  if(!S.flaggedConflicts)S.flaggedConflicts=[];
  S.flaggedConflicts.push({id:nid(),evId:eid,date:ev.date,service:ev.service,provider:ev.provider,client:c?c.name:'',slot:SLOTS[ev.slotIndex].label,note:note,anon:anon,ts:new Date().toISOString()});
  ev.flagged=true;
  saveAll();renderAll();closeModal();
  setTimeout(function(){
    showModal(
      '<div style="text-align:center;padding:16px 0">'+
      '<div style="font-size:40px;margin-bottom:12px">&#x2705;</div>'+
      '<div style="font-size:15px;font-weight:600;margin-bottom:8px">Conflict reported</div>'+
      '<div style="font-size:13px;color:var(--tx2);margin-bottom:20px">The director has been notified. The service now shows a &#x26A0;&#xFE0F; icon until resolved.</div>'+
      '<button onclick="closeModal()" style="padding:9px 28px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Done</button></div>'
    );
  },50);
}
function openConflictLog(){
  var fc=S.flaggedConflicts||[];
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
    '<div style="font-size:15px;font-weight:600">&#x26A0;&#xFE0F; Conflict Reports</div>'+
    (fc.length?'<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg-warn);color:var(--tx-err);border:.5px solid var(--bd-err)">'+fc.length+' open</span>':'')+'</div>';
  if(!fc.length){
    h+='<div style="text-align:center;padding:28px;color:var(--tx3);font-size:13px">No conflicts reported &#x1F44D;</div>';
  } else {
    h+='<div style="max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:16px">';
    fc.slice().reverse().forEach(function(cf){
      h+='<div style="padding:12px 14px;border-radius:var(--r);border:.5px solid var(--bd-err);background:var(--bg-warn)">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">'+
        '<div><div style="font-size:13px;font-weight:600;color:var(--tx)">'+esc(cf.service)+'</div>'+
        '<div style="font-size:11px;color:var(--tx2);margin-top:2px">'+esc(cf.provider)+(cf.client?' &middot; '+esc(cf.client):'')+' &middot; '+esc(cf.slot)+' &middot; '+esc(cf.date)+'</div></div>'+
        '<button onclick="resolveConflict(\''+cf.id+'\')" style="flex-shrink:0;padding:4px 10px;border-radius:var(--r);border:.5px solid var(--bd-ok);background:var(--bg-ok);color:var(--tx-ok);cursor:pointer;font-size:11px;font-family:var(--f)">&#x2713; Resolve</button></div>'+
        (cf.note?'<div style="font-size:12px;color:var(--tx2);padding:8px;background:rgba(0,0,0,.04);border-radius:var(--r)">'+esc(cf.note)+'</div>':'<div style="font-size:11px;color:var(--tx3);font-style:italic">No notes.</div>')+
        '<div style="font-size:10px;color:var(--tx3);margin-top:6px">'+(cf.anon?'Anonymous &bull; ':'')+
        'Reported '+new Date(cf.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})+'</div>'+
      '</div>';
    });
    h+='</div><div style="display:flex;justify-content:space-between;align-items:center">'+
      '<button onclick="if(confirm(\'Clear all conflicts?\'))clearConflicts()" style="font-size:12px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:var(--f)">Clear all</button>'+
      '<button onclick="closeModal()" style="padding:8px 20px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Close</button></div>';
  }
  showModal(h);
}
function resolveConflict(cfid){
  var cf=S.flaggedConflicts.find(function(c){return c.id===cfid;});
  if(cf){var ev=S.events.find(function(e){return e.id===cf.evId;});if(ev)ev.flagged=false;}
  S.flaggedConflicts=S.flaggedConflicts.filter(function(c){return c.id!==cfid;});
  saveAll();renderAll();openConflictLog();
}
function clearConflicts(){S.flaggedConflicts=[];S.events.forEach(function(e){e.flagged=false;});saveAll();renderAll();closeModal();}

  );

function calcCopy(eid){
  var ev=S.events.find(function(e){return e.id===eid;});if(!ev)return{toCreate:[],skipped:0};
  var sd=[0,1,2,3,4,5,6].filter(function(i){return document.getElementById('cdc-'+i)&&document.getElementById('cdc-'+i).checked;});
  var sc=S.clients.filter(function(c){return document.getElementById('ccc-'+c.id)&&document.getElementById('ccc-'+c.id).checked;}).map(function(c){return c.id;});
  var sw=[0,1,2,3].filter(function(i){return document.getElementById('cwc-'+i)&&document.getElementById('cwc-'+i).checked;});
  var tc=[],sk=0;
  sw.forEach(function(o){var m=addDays(S.weekStart,o*7);sd.forEach(function(di){var td=addDays(m,di);sc.forEach(function(cid){
    if(td===ev.date&&cid===ev.clientId)return;
    var ov=S.events.some(function(e){return e.date===td&&e.clientId===cid&&e.slotIndex<ev.slotIndex+ev.duration&&e.slotIndex+e.duration>ev.slotIndex;});
    var nw=tc.some(function(e){return e.date===td&&e.clientId===cid;});
    if(ov||nw){sk++;return;}
    tc.push({id:nid(),date:td,clientId:cid,slotIndex:ev.slotIndex,duration:ev.duration,service:ev.service,provider:ev.provider,flagged:false,status:'scheduled',statusNote:''});
  });});});
  return{toCreate:tc,skipped:sk};
}
function updCP(eid){
  var p=document.getElementById('cp-prev'),b=document.getElementById('cp-btn');if(!p)return;
  var r=calcCopy(eid);
  if(!r.toCreate.length&&!r.skipped){p.innerHTML='<i class="ti ti-info-circle" style="font-size:13px;color:var(--tx3)"></i> Select at least one day, client, and week.';if(b){b.disabled=true;b.textContent='Copy';}}
  else if(!r.toCreate.length){p.innerHTML='<i class="ti ti-alert-circle" style="font-size:13px"></i> All slots already occupied.';if(b){b.disabled=true;b.textContent='Copy';}}
  else{p.innerHTML='<i class="ti ti-check" style="font-size:13px;color:var(--tx-ok)"></i> <strong>'+r.toCreate.length+' new session'+(r.toCreate.length>1?'s':'')+'</strong> will be created'+(r.skipped?' <span style="color:var(--tx3)">\u00b7 '+r.skipped+' skipped</span>':'');if(b){b.disabled=false;b.textContent='Copy '+r.toCreate.length+' session'+(r.toCreate.length>1?'s':'');}}
}
function execCopy(eid){var r=calcCopy(eid);if(!r.toCreate.length)return;r.toCreate.forEach(function(e){S.events.push(e);});renderAll();saveAll();closeModal();}

    allDates.forEach(function(date){

      if(y+estH>195){doc.addPage();y=14;}
      doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(15,23,42);doc.text(fmtFull(date),mg,y);y+=4;
      var tW=20,cW=(uW-tW)/Math.max(S.clients.length,1);

      var body=[];

          var ev=de.find(function(e){return e.clientId===client.id&&e.slotIndex===si;});
          var cEv=de.find(function(e){return e.clientId===client.id&&si>e.slotIndex&&si<e.slotIndex+e.duration;});
          if(ev){var rc=rgb(pc(ev.provider));row.push({content:ev.service+(ev.flagged?'\n\u26A0 Conflict':''),styles:{fillColor:[rc[0],rc[1],rc[2]],textColor:[255,255,255],fontSize:6.5,fontStyle:'bold',cellPadding:2}});}
          else if(cEv){var rc2=rgb(pc(cEv.provider));row.push({content:'',styles:{fillColor:[rc2[0],rc2[1],rc2[2]],lineWidth:0}});}
          else row.push({content:'',styles:{fillColor:[255,255,255]}});
        });
        body.push(row);
      }
      doc.autoTable({head:head,body:body,startY:y,styles:{fontSize:7,cellPadding:1.5,lineColor:[226,232,240],lineWidth:.2,overflow:'linebreak'},headStyles:{fillColor:[30,41,59],textColor:[255,255,255],fontSize:8,halign:'center',cellPadding:3},columnStyles:Object.assign({0:{cellWidth:tW}},Object.fromEntries(S.clients.map(function(_,i){return[i+1,{cellWidth:cW}];}))),margin:{left:mg,right:mg}});
      y=doc.lastAutoTable.finalY+10;
    });
    var pages=doc.getNumberOfPages();
    for(var i=1;i<=pages;i++){doc.setPage(i);doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(148,163,184);doc.text(S.title+' \u00b7 Page '+i+' of '+pages,pW/2,205,{align:'center'});}
    doc.save(S.title.replace(/[^a-z0-9]/gi,'_')+'.pdf');
  }catch(err){console.error(err);alert('PDF failed: '+err.message);}
  finally{if(btn){btn.innerHTML='<i class="ti ti-file-type-pdf"></i> PDF';btn.disabled=false;}}

function exportToStipendExcel(){
  if(typeof XLSX==='undefined'){alert('Still loading.');return;}
  var btn=document.getElementById('stipend-btn');if(btn){btn.innerHTML='...';btn.disabled=true;}
  try{
    var wb=XLSX.utils.book_new();

    // Helper: is provider excluded from stipend?
    function noStipend(prov){return !!(S.providers[prov]&&S.providers[prov].noStipend);}
    function provType(prov){return(S.providers[prov]&&S.providers[prov].type)||'session';}

    // Build sorted week list
    var weekMap={};
    S.events.forEach(function(ev){
      if(noStipend(ev.provider))return;
      var ws=getMon(fromISO(ev.date));
      if(!weekMap[ws])weekMap[ws]=[];weekMap[ws].push(ev);
    });
    var sortedWeeks=Object.keys(weekMap).sort();

    // Format week label: M/D–M/D/YYYY
    function wkLabel(wStart){
      var wEnd=addDays(wStart,6);
      var s=fromISO(wStart),e=fromISO(wEnd);
      return (s.getMonth()+1)+'/'+s.getDate()+'\u2013'+(e.getMonth()+1)+'/'+e.getDate()+'/'+e.getFullYear();
    }

    // Track PDI episodes already counted: key = clientId+':'+providerName
    var pdiCounted={};

    var lineItems=[];
    var summaryRows=[];
    var totSigHrs=0,totSigCost=0,totPDICost=0;

    // Weekly Staff Roster tracking
    var sigHrsByStaff={};   // staff -> week -> hrs
    var sigStiByStaff={};   // staff -> week -> $
    var pdiStiByStaff={};   // staff -> week -> $
    var allWeekSet={};
    var sigStaffSet={};
    var weekStiStaffSet={};
    var pdiStaffSet={};

    sortedWeeks.forEach(function(wStart){
      allWeekSet[wStart]=true;
      var wEvs=weekMap[wStart];
      var wLbl=wkLabel(wStart);
      var wSigHrs=0,wSigCost=0,wPDICost=0;

      var clientsThisWeek=new Set(wEvs.map(function(e){return e.clientId;}));

      clientsThisWeek.forEach(function(cid){
        var client=S.clients.find(function(c){return c.id===cid;});
        var cName=client?client.name:cid;
        var cProg=client?(client.program||'PDI'):'PDI';
        var cEvs=wEvs.filter(function(e){return e.clientId===cid;});

        // ── Signature track ──────────────────────────────────────────────
        if(cProg==='Signature'||cProg==='Both'){
          // Session providers: hrs × $150
          var sessionProvMap={};
          cEvs.forEach(function(ev){
            if(noStipend(ev.provider))return;
            if(provType(ev.provider)==='session'){
              if(!sessionProvMap[ev.provider])sessionProvMap[ev.provider]=0;
              sessionProvMap[ev.provider]+=ev.duration; // 30-min slots
            }
          });
          Object.keys(sessionProvMap).sort().forEach(function(prov){
            var hrs=sessionProvMap[prov]/2;
            var amt=hrs*150;
            wSigHrs+=hrs;wSigCost+=amt;
            lineItems.push({week:wLbl,client:cName,track:'Signature',staff:prov,
              type:'Session',sessHrs:hrs,rate:150,amount:amt,counted:amt,notes:''});
            // roster
            if(!sigHrsByStaff[prov])sigHrsByStaff[prov]={};
            if(!sigHrsByStaff[prov][wStart])sigHrsByStaff[prov][wStart]=0;
            sigHrsByStaff[prov][wStart]+=hrs;
            sigStaffSet[prov]=true;
          });

          // Weekly stipend providers: $250/wk per active Sig client
          if(cEvs.length>0){
            Object.keys(S.providers).sort().forEach(function(prov){
              if(noStipend(prov))return;
              if(provType(prov)==='weekly'){
                wSigCost+=250;
                lineItems.push({week:wLbl,client:cName,track:'Signature',staff:prov,
                  type:'Weekly Stipend',sessHrs:'',rate:'',amount:250,counted:250,notes:''});
                if(!sigStiByStaff[prov])sigStiByStaff[prov]={};
                if(!sigStiByStaff[prov][wStart])sigStiByStaff[prov][wStart]=0;
                sigStiByStaff[prov][wStart]+=250;
                weekStiStaffSet[prov]=true;
              }
            });
          }
        }

        // ── PDI track — flat $250 once per episode ────────────────────────
        if(cProg==='PDI'||cProg==='Both'){
          var pdiProvs=new Set(cEvs.map(function(e){return e.provider;}).filter(function(p){return !noStipend(p);}));
          pdiProvs.forEach(function(prov){
            var key=cid+':'+prov;
            var alreadyCounted=!!pdiCounted[key];
            var counted=alreadyCounted?0:250;
            var note=alreadyCounted?'PDI per-episode stipend \u2014 already counted in earlier week of this episode.':'';
            if(!alreadyCounted)pdiCounted[key]=true;
            wPDICost+=counted;
            lineItems.push({week:wLbl,client:cName,track:'PDI',staff:prov,
              type:'Flat Stipend',sessHrs:'',rate:'',amount:250,counted:counted,notes:note});
            if(!pdiStiByStaff[prov])pdiStiByStaff[prov]={};
            if(!pdiStiByStaff[prov][wStart])pdiStiByStaff[prov][wStart]=0;
            pdiStiByStaff[prov][wStart]+=counted;
            pdiStaffSet[prov]=true;
          });
        }
      });

      totSigHrs+=wSigHrs;totSigCost+=wSigCost;totPDICost+=wPDICost;
      summaryRows.push({week:wLbl,sigHrs:wSigHrs,sigCost:wSigCost,pdiCost:wPDICost,combined:wSigCost+wPDICost});
    });

    // ── Sheet 1: Line Items ────────────────────────────────────────────────
    var liHdr1=['Staff Stipends \u2014 Signature & PDI Detail'];
    var liHdr2=['Track = client program. Signature: Session ($150/hr direct service) and Weekly Stipend ($250/wk). PDI = flat $250 stipend (paid once per diagnostic episode). "Counted ($)" = episode-adjusted amount used in all totals.'];
    var liHdr3=['Week','Client','Track','Staff','Stipend Type','Sessions / Hrs','Rate ($)','Amount ($)','Counted ($)','Notes'];
    var liData=[liHdr1,liHdr2,[],liHdr3];
    lineItems.forEach(function(r){
      liData.push([r.week,r.client,r.track,r.staff,r.type,r.sessHrs,r.rate,r.amount,r.counted,r.notes]);
    });
    // Totals
    var totAllAmt=lineItems.reduce(function(s,r){return s+r.amount;},0);
    var totAllCounted=lineItems.reduce(function(s,r){return s+r.counted;},0);
    var totSessHrs=lineItems.filter(function(r){return r.type==='Session';}).reduce(function(s,r){return s+(r.sessHrs||0);},0);
    liData.push(['','','','TOTAL','',totSessHrs,'',totAllAmt,totAllCounted,'']);
    var ws1=XLSX.utils.aoa_to_sheet(liData);
    ws1['!cols']=[{wch:20},{wch:16},{wch:12},{wch:22},{wch:16},{wch:14},{wch:10},{wch:12},{wch:12},{wch:55}];
    ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:9}},{s:{r:1,c:0},e:{r:1,c:9}}];
    XLSX.utils.book_append_sheet(wb,ws1,'Line Items');

    // ── Sheet 2: Summary ──────────────────────────────────────────────────
    var smHdr1=['Weekly Summary \u2014 Signature & PDI'];
    var smHdr2=['Signature Hrs = direct service sessions @ $150. Signature Cost includes those sessions plus $250/wk Signature stipends. PDI Cost = flat $250 PDI stipends (once per episode).'];
    var smHdr3=['Week','Signature','','PDI Cost','Combined Cost'];
    var smHdr4=['','Direct Service Hrs','Cost','',''];
    var smData=[smHdr1,smHdr2,[],smHdr3,smHdr4];
    summaryRows.forEach(function(r){smData.push([r.week,r.sigHrs,r.sigCost,r.pdiCost,r.combined]);});
    smData.push(['TOTAL',totSigHrs,totSigCost,totPDICost,totSigCost+totPDICost]);
    var ws2=XLSX.utils.aoa_to_sheet(smData);
    ws2['!cols']=[{wch:22},{wch:22},{wch:14},{wch:12},{wch:16}];
    ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:4}},{s:{r:1,c:0},e:{r:1,c:4}},{s:{r:3,c:1},e:{r:3,c:2}}];
    XLSX.utils.book_append_sheet(wb,ws2,'Summary');

    // ── Sheet 3: Weekly Staff Roster ──────────────────────────────────────
    var allWeeks=sortedWeeks;
    var wkLabels=allWeeks.map(wkLabel);
    var rosterRows=[];
    rosterRows.push(['Weekly Staff Roster']);
    rosterRows.push(['Three categories: Signature direct service hours (sessions @ $150), Signature weekly stipends ($250/wk), and PDI flat stipends ($250). A provider may appear in more than one.']);
    rosterRows.push([]);
    // Section 1: Sig session hrs
    rosterRows.push(['SIGNATURE \u2014 Direct Service Hours per Week (sessions @ $150)']);
    var sigHdr=['Staff / Week'].concat(wkLabels).concat(['Total Hrs']);
    rosterRows.push(sigHdr);
    var sigStaff=Object.keys(sigStaffSet).sort();
    var sigColTotals=allWeeks.map(function(){return 0;});var sigGrandTot=0;
    sigStaff.forEach(function(s){
      var row=[s];var tot=0;
      allWeeks.forEach(function(w,i){var h=(sigHrsByStaff[s]&&sigHrsByStaff[s][w])||0;row.push(h);tot+=h;sigColTotals[i]+=h;});
      row.push(tot);sigGrandTot+=tot;rosterRows.push(row);
    });
    rosterRows.push(['Total'].concat(sigColTotals).concat([sigGrandTot]));
    rosterRows.push([]);
    // Section 2: Sig weekly stipend
    rosterRows.push(['SIGNATURE \u2014 Weekly Stipend $ ($250/wk)']);
    var wkStiHdr=['Staff / Week'].concat(wkLabels).concat(['Total $']);
    rosterRows.push(wkStiHdr);
    var weekStiStaff=Object.keys(weekStiStaffSet).sort();
    var wkStiColTot=allWeeks.map(function(){return 0;});var wkStiGrand=0;
    weekStiStaff.forEach(function(s){
      var row=[s];var tot=0;
      allWeeks.forEach(function(w,i){var v=(sigStiByStaff[s]&&sigStiByStaff[s][w])||0;row.push(v);tot+=v;wkStiColTot[i]+=v;});
      row.push(tot);wkStiGrand+=tot;rosterRows.push(row);
    });
    rosterRows.push(['Total'].concat(wkStiColTot).concat([wkStiGrand]));
    rosterRows.push([]);
    // Section 3: PDI flat stipend
    rosterRows.push(['PDI \u2014 Flat Stipend $ ($250 each, once per episode)']);
    var pdiHdr=['Staff / Week'].concat(wkLabels).concat(['Total $']);
    rosterRows.push(pdiHdr);
    var pdiStaff=Object.keys(pdiStaffSet).sort();
    var pdiColTot=allWeeks.map(function(){return 0;});var pdiGrand=0;
    pdiStaff.forEach(function(s){
      var row=[s];var tot=0;
      allWeeks.forEach(function(w,i){var v=(pdiStiByStaff[s]&&pdiStiByStaff[s][w])||0;row.push(v);tot+=v;pdiColTot[i]+=v;});
      row.push(tot);pdiGrand+=tot;rosterRows.push(row);
    });
    rosterRows.push(['Total'].concat(pdiColTot).concat([pdiGrand]));

    var ws3=XLSX.utils.aoa_to_sheet(rosterRows);
    var rCols=[{wch:24}].concat(allWeeks.map(function(){return{wch:16};})).concat([{wch:10}]);
    ws3['!cols']=rCols;
    XLSX.utils.book_append_sheet(wb,ws3,'Weekly Staff Roster');

    XLSX.writeFile(wb,'PDI_Signature_Stipends_'+new Date().toISOString().slice(0,10)+'.xlsx');
  }catch(err){alert('Stipend export failed: '+err.message);console.error(err);}
  finally{if(btn){btn.innerHTML='<i class="ti ti-currency-dollar"></i> Stipend Roster';btn.disabled=false;}}
}





var _mgmtAuthed=false;
function openManageProviders(){
  if(_mgmtAuthed){showModal('');buildProvModal();return;}
  showModal(
    '<div style="text-align:center;margin-bottom:20px">'+
    '<div style="font-size:36px;margin-bottom:8px"></div>'+
    '<div style="font-size:15px;font-weight:600;margin-bottom:6px">Manage Providers</div>'+
    '<div style="font-size:12px;color:var(--tx3)">Enter the access code to continue.</div>'+
    '</div>'+
    '<div style="margin-bottom:8px"><input type="password" id="mgmt-pw" placeholder="Access code..." style="text-align:center;letter-spacing:.15em;font-size:15px"></div>'+
    '<div id="mgmt-err" style="color:var(--tx-err);font-size:12px;text-align:center;min-height:18px;margin-bottom:12px"></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end">'+cBtn()+
    ' <button id="mgmt-go" style="padding:8px 20px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Continue</button></div>'
  );
  setTimeout(function(){
    var inp=document.getElementById('mgmt-pw');if(inp)inp.focus();
    function tryAuth(){
      var pw=inp&&inp.value;
      if(pw==='Lifeskills2024!'){_mgmtAuthed=true;buildProvModal();}
      else{var err=document.getElementById('mgmt-err');if(err)err.textContent='Incorrect code.';if(inp){inp.value='';inp.focus();}}
    }
    var btn=document.getElementById('mgmt-go');if(btn)btn.addEventListener('click',tryAuth);
    if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter')tryAuth();});
  },30);
}
function buildProvModal(){
  var entries=Object.entries(S.providers);
  var stL={'none':'No stipend','session':'Session fees','weekly':'PDI + Weekly','pdi_weekly':'PDI + Weekly'};
  var stC={'none':'#6b7280','session':'#1D9E75','weekly':'#D4537E','pdi_weekly':'#D4537E'};
  // Store provider names in a global lookup so inline onclick can reference by index
  window._provNames=entries.map(function(e){return e[0];});
  var rows=entries.map(function(e,idx){
    var name=e[0],color=e[1].color||'#888',stype=e[1].stipendType||'session';
    var cnt=S.events.filter(function(ev){return ev.provider===name;}).length;
    var bl=stL[stype]||'Session fees',bc=stC[stype]||'#1D9E75';
    return '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;background:var(--bg2);border:.5px solid var(--bd2);margin-bottom:8px;border-left:3px solid '+color+'">'+
      '<div style="width:28px;height:28px;border-radius:50%;background:'+color+';flex-shrink:0;cursor:pointer;position:relative" title="Change color">'+
        '<input type="color" value="'+color+'" onchange="provColChange('+idx+',this.value)" style="opacity:0;position:absolute;inset:0;width:100%;height:100%;cursor:pointer;border:none;padding:0">'+
      '</div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--tx)">'+esc(name)+'</div>'+
      '<div style="font-size:10px;color:var(--tx3)">'+cnt+' session'+(cnt!==1?'s':'')+'</div></div>'+
      '<span style="font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:'+bc+'18;color:'+bc+';border:1px solid '+bc+'44;white-space:nowrap;flex-shrink:0">'+bl+'</span>'+
      '<button onclick="openEditStipend(_provNames['+idx+'])" style="padding:5px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);cursor:pointer;font-size:11px;color:var(--tx2);font-family:var(--f);flex-shrink:0">Edit</button>'+
      '<button onclick="deleteProvider(_provNames['+idx+'])" style="padding:5px 10px;border-radius:var(--r);border:.5px solid var(--bd-err);background:var(--bg-warn);cursor:pointer;font-size:11px;font-weight:500;color:var(--tx-err);font-family:var(--f);flex-shrink:0">Remove</button>'+
    '</div>';
  }).join('');
  showModal(
    '<div style="font-size:15px;font-weight:600;margin-bottom:16px">Manage Providers</div>'+
    '<div style="max-height:360px;overflow-y:auto;margin-bottom:16px">'+(rows||'<div style="text-align:center;padding:20px;color:var(--tx3)">No providers yet.</div>')+'</div>'+
    '<div style="background:var(--bg2);border-radius:var(--rl);padding:14px;border:.5px solid var(--bd);margin-bottom:16px">'+
      '<div style="font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:10px">Add provider</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<input type="color" id="np-col" value="#7F77DD" style="width:34px;height:34px;flex-shrink:0;border:none;border-radius:50%;cursor:pointer;padding:0">'+
        '<input type="text" id="np-name" placeholder="Provider name..." style="flex:1" >'+
        '<button onclick="addProvider()" style="padding:8px 16px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f);white-space:nowrap">+ Add</button>'+
      '</div>'+
    '</div>'+
    '<div style="display:flex;justify-content:flex-end"><button onclick="closeModal()" style="padding:8px 24px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Done</button></div>'
  );
  setTimeout(function(){var i=document.getElementById('np-name');if(i)i.focus();},30);
}
function provColChange(idx,val){
  var name=window._provNames&&window._provNames[idx];
  if(name&&S.providers[name]){S.providers[name].color=val;renderLegend();saveAll();}
}'<div style="background:var(--bg2);border-radius:var(--rl);padding:14px;border:.5px solid var(--bd);margin-bottom:16px">'+
    '<div style="font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:10px">Add provider from staff roster</div>'+
    (function(){var roster=["Alexandria Marullo", "Anisha Hume", "Anthony", "Brian", "David Ockman", "Despina Karfis", "Dr. Flannery", "Dr. Forstadt", "Esther Entin", "Gregory Fortune", "Gus Hernandez", "Mirella Ezeta", "Nicole", "PBWI", "Paul Lazar", "Rabbi Gaines", "Robert Bruno", "Sandra Bernstein", "Tara Alhadeff", "Tech Team", "Thomas Young"];var avail=roster.filter(function(n){return!S.providers[n];});return avail.length?
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<input type="color" id="np-col" value="#7F77DD" style="width:34px;height:34px;flex-shrink:0;border:none;border-radius:50%;cursor:pointer;padding:0">'+
        '<select id="np-name" style="flex:1"><option value="">Select name...</option>'+
        avail.map(function(n){return '<option value="'+n+'">'+n+'</option>';}).join('')+
        '</select>'+
        '<button onclick="addProvider()" style="padding:8px 16px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f);white-space:nowrap">+ Add</button>'+
      '</div>':
      '<div style="font-size:12px;color:var(--tx3);text-align:center;padding:8px 0">All staff members already added</div>';})()+'</div>'+

function openEditStipend(name){
  var p=S.providers[name];if(!p)return;
  var stype=p.stipendType||'session',color=p.color||'#888';
  var opts=[
    {val:'none',label:'Not eligible',desc:'Excluded from all stipend calculations.',c:'#6b7280'},
    {val:'session',label:'Session fees ($150/hr)',desc:'Signature: $150/hr per session. PDI: $250 flat stipend when sessions are present.',c:'#1D9E75'},
    {val:'pdi_weekly',label:'PDI + Weekly ($250)',desc:'PDI: $250 once per episode per client (automatic). Signature: $250/week per active client.',c:'#D4537E'},
  ];
  window._editStipendName=name;
  var cards=opts.map(function(o){
    var on=stype===o.val||(stype==='weekly'&&o.val==='pdi_weekly');
    return '<label style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;border:2px solid '+(on?o.c:'var(--bd)')+';background:'+(on?o.c+'12':'var(--bg2)')+';cursor:pointer;margin-bottom:8px">'+
      '<input type="radio" name="st-type" value="'+o.val+'" '+(on?'checked':'')+' style="accent-color:'+o.c+';margin-top:3px;flex-shrink:0">'+
      '<div><div style="font-size:13px;font-weight:600;color:'+(on?o.c:'var(--tx)')+'">'+o.label+'</div>'+
      '<div style="font-size:11px;color:var(--tx3);margin-top:2px">'+o.desc+'</div></div></label>';
  }).join('');
  showModal(
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'+
      '<div style="width:36px;height:36px;border-radius:50%;background:'+color+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0">'+name.charAt(0)+'</div>'+
      '<div style="font-size:15px;font-weight:600">'+esc(name)+'</div></div>'+
    '<div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:10px">Stipend eligibility</div>'+
    cards+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">'+
      '<button onclick="buildProvModal()" style="padding:8px 16px;border-radius:var(--r);border:.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:13px;color:var(--tx2);font-family:var(--f)">← Back</button>'+
      '<button onclick="saveStipendType()" style="padding:8px 20px;border-radius:var(--r);border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--f)">Save</button></div>'
  );
  setTimeout(function(){
    document.querySelectorAll('input[name="st-type"]').forEach(function(r){
      r.addEventListener('change',function(){
        var val=this.value,cm={none:'#6b7280',session:'#1D9E75',pdi_weekly:'#D4537E'};
        document.querySelectorAll('label').forEach(function(lbl){
          var inp=lbl.querySelector('input[name="st-type"]');if(!inp)return;
          var on=inp.value===val,c=cm[inp.value]||'#888';
          lbl.style.borderColor=on?c:'var(--bd)';lbl.style.background=on?c+'12':'var(--bg2)';
          var t=lbl.querySelector('div div');if(t)t.style.color=on?c:'var(--tx)';
        });
      });
    });
  },20);
}
function saveStipendType(){
  var name=window._editStipendName;
  var sel=document.querySelector('input[name="st-type"]:checked');
  if(!sel||!name)return;
  if(S.providers[name]){
    S.providers[name].stipendType=sel.value;
    S.providers[name].noStipend=sel.value==='none';
    S.providers[name].type=sel.value==='pdi_weekly'?'weekly':'session';
  }
  saveAll();buildProvModal();
}
