// ── Week navigation ────────────────────────────────────────────────────────
var _wkOffset=0;
function getMondayISO(offset){
  // Returns the start of the billing period (Saturday) containing today + offset weeks
  var d=new Date();
  var day=d.getDay(); // 0=Sun..6=Sat
  var diff=(day+1)%7; // days since last Saturday
  d.setDate(d.getDate()-diff+offset*7);
  return d.toISOString().slice(0,10);
}
function fmtWeekRange(sat){
  // Billing period: Saturday through Friday
  var d=new Date(sat+'T12:00:00'),e=new Date(sat+'T12:00:00');
  e.setDate(e.getDate()+6); // +6 days = Friday
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+
    ' – '+e.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function setWeekFilter(mon){
  var sun=new Date(mon+'T12:00:00');sun.setDate(sun.getDate()+6);
  var sunISO=sun.toISOString().slice(0,10);
  var fe=document.getElementById('flt-from'),te=document.getElementById('flt-to');
  if(fe)fe.value=mon;
  if(te)te.value=sunISO;
  var lbl=document.getElementById('wk-range-lbl');
  if(lbl)lbl.textContent=fmtWeekRange(mon);
  updateNavBtns();
  if(window._fbLoaded)render();
}
function shiftWeek(dir){
  _wkOffset+=dir;
  if(_wkOffset>0)_wkOffset=0;
  setWeekFilter(getMondayISO(_wkOffset));
}
function clearWeekFilter(){
  _wkOffset=0;
  var fe=document.getElementById('flt-from'),te=document.getElementById('flt-to');
  if(fe)fe.value='';if(te)te.value='';
  var lbl=document.getElementById('wk-range-lbl');
  if(lbl)lbl.textContent='All weeks';
  var tp=document.getElementById('wk-picker');
  if(tp)tp.style.display='none';
  var ft=document.getElementById('flt-track');
  if(ft)ft.value='all';
  updateNavBtns();
  if(window._fbLoaded)render();
}
function toggleWeekPicker(){
  var p=document.getElementById('wk-picker');
  if(p)p.style.display=p.style.display==='none'?'flex':'none';
}
function onDateChange(){
  var from=document.getElementById('flt-from'),to=document.getElementById('flt-to');
  var lbl=document.getElementById('wk-range-lbl');
  if(from&&to&&from.value&&to.value&&lbl){
    var d=new Date(from.value+'T12:00:00'),e=new Date(to.value+'T12:00:00');
    lbl.textContent=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+
      ' – '+e.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }else if(lbl)lbl.textContent='All weeks';
  updateNavBtns();
  if(window._fbLoaded)render();
}
function updateNavBtns(){
  var nb=document.getElementById('wk-next');
  if(nb)nb.disabled=_wkOffset>=0;
}
window.addEventListener('DOMContentLoaded',function(){
  setWeekFilter(getMondayISO(0));
});
</script>

/* ── Header ── */
.hdr{background:#1e170e;padding:18px 32px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;}
.hdr-logos{display:flex;align-items:center;gap:14px;}
.hdr-logos img{height:36px;object-fit:contain;}
.hdr-div{width:.5px;height:30px;background:rgba(255,255,255,.15);}
.hdr-text{color:#fff;}
.hdr-text h1{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.nav-link{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1px solid rgba(160,135,100,.35);background:rgba(255,252,245,.12);color:rgba(255,252,245,.75);font-size:11px;font-weight:600;text-decoration:none;font-family:var(--f);transition:all .15s;white-space:nowrap;}
.nav-link:hover{background:rgba(255,252,245,.22);color:#fff;border-color:rgba(160,135,100,.6);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0;}
.live-dot.on{background:var(--green);}
.live-dot.off{background:var(--red);}
#live-lbl{font-size:11px;color:rgba(255,255,255,.45);}
/* ── Nav ── */
.nav{background:#fff;border-bottom:1px solid var(--bd);display:flex;padding:0 32px;position:sticky;top:57px;z-index:90;}
.nav-tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--tx);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
/* ── Filters ── */
.filters{display:flex;align-items:center;gap:8px;padding:12px 32px;background:#fff;border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.wk-nav-btn{width:32px;height:32px;border-radius:8px;border:.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:18px;color:var(--tx2);display:flex;align-items:center;justify-content:center;font-family:var(--f);transition:all .15s;}

/* ── Content ── */
.content{padding:24px 32px;max-width:1600px;}
.hidden{display:none!important;}
/* ── Summary cards ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.card{background:#fff;border:.5px solid var(--bd);border-radius:12px;padding:18px 20px;}
.card-label{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.card-val{font-size:26px;font-weight:700;color:var(--tx);letter-spacing:-.5px;}
.card-sub{font-size:11px;color:var(--tx3);margin-top:4px;}
.card.green{border-color:#1D9E7544;background:#f0fdf4;}
.card.green .card-val{color:var(--green);}
.card.blue{border-color:#4a6c8a44;background:#eff6ff;}
.card.blue .card-val{color:var(--blue);}
.card.gold{border-color:#BA751744;background:#fffbeb;}
.card.gold .card-val{color:var(--gold);}
.card.purple{border-color:#6b5c4544;background:#f5f3ff;}
.card.purple .card-val{color:var(--accent);}
/* ── Tables ── */
.tbl-wrap{background:#fff;border:.5px solid var(--bd);border-radius:12px;overflow:auto;margin-bottom:24px;}
.tbl-hdr{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.tbl-hdr h3{font-size:14px;font-weight:600;color:var(--tx);}
.tbl-hdr p{font-size:11px;color:var(--tx3);margin-top:2px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:#1e170e;color:#fff;padding:10px 14px;text-align:left;font-size:11px;font-weight:500;letter-spacing:.04em;white-space:nowrap;}
thead th:first-child{border-radius:0;}
tbody tr:nth-child(even){background:var(--bg);}
tbody tr:hover{background:var(--bg2);}
tbody td{padding:9px 14px;border-bottom:.5px solid var(--bd);color:var(--tx2);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
td.num{text-align:right;font-variant-numeric:tabular-nums;}
td.money{text-align:right;font-variant-numeric:tabular-nums;font-weight:500;}
td.money.amt{color:var(--green);}
td.money.zero{color:var(--tx3);}
.total-row td{background:#1e170e;color:#fff;font-weight:600;border-bottom:none;}
.total-row td.money{color:#86efac;}
.track-sig{color:var(--accent);font-weight:500;}
.track-pdi{color:var(--blue);font-weight:500;}
.counted-zero{color:var(--tx3);font-size:11px;}
.note-cell{font-size:11px;color:var(--tx3);font-style:italic;max-width:300px;}
/* ── Section divider ── */
.section-div{margin:24px 0 12px;display:flex;align-items:center;gap:12px;}
.section-div h3{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;}
.section-div::after{content:'';flex:1;height:.5px;background:var(--bd);}
/* ── Crosshatch table (roster) ── */
.roster-wrap{overflow-x:auto;}
.roster-tbl{min-width:max-content;}
.roster-tbl th.corner{min-width:180px;}
.roster-tbl th.wk{min-width:120px;text-align:right;}
.roster-tbl th.tot{min-width:90px;text-align:right;background:#1e170e;}
.roster-tbl td.staff{font-weight:600;color:var(--tx);white-space:nowrap;}
.roster-tbl td.wkval{text-align:right;font-variant-numeric:tabular-nums;}
.roster-tbl td.wkval.zero{color:var(--tx3);}
.roster-tbl td.rowtot{text-align:right;font-weight:600;background:var(--bg2);}
/* ── Empty/loading ── */
.empty{padding:60px;text-align:center;color:var(--tx3);}
.spin{display:inline-block;width:24px;height:24px;border:2.5px solid var(--bd2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.approve-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--f);color:var(--tx3);transition:all .15s;}
.approve-btn.approved{background:#1D9E7518;color:var(--green);border-color:#1D9E7566;}
.approve-btn:hover:not(.approved){background:var(--bg2);}
.excel-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r,8px);border:1.5px solid #1D9E7566;background:#1D9E7511;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--f);color:var(--green,#1D9E75);transition:all .15s;}
.excel-btn:hover{background:#1D9E7522;}
.staff-week-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.staff-week-tbl thead th{background:#1e170e;color:#fff;padding:10px 14px;text-align:left;font-size:11px;font-weight:500;letter-spacing:.04em;white-space:nowrap;}
.staff-week-tbl tbody td{padding:9px 14px;border-bottom:.5px solid var(--bd);color:var(--tx2);vertical-align:middle;}
.staff-week-tbl tbody tr:nth-child(even) td{background:var(--bg);}
.staff-week-tbl .total-row td{background:#1e170e;color:#fff;font-weight:600;border-bottom:none;}
.staff-week-tbl .total-row td.money{color:#86efac;}
@media print{.hdr,.nav,.filters{position:static!important;}.nav-tab:not(.active){display:none;}}

function toISO(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
function fromISO(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(iso,n){var d=fromISO(iso);d.setDate(d.getDate()+n);return toISO(d);}

  // ── Provider helpers ─────────────────────────────────────────────────────
  function noStipend(p){var pr=DATA.providers[p];if(!pr)return false;return pr.stipendType?pr.stipendType==='none':!!pr.noStipend;}
  function isWeeklyProv(p){var pr=DATA.providers[p];if(!pr)return false;var st=pr.stipendType;return st==='weekly'||st==='pdi_weekly';}
  function isSessionProv(p){return !noStipend(p)&&!isWeeklyProv(p);}

  // ── Event helpers ─────────────────────────────────────────────────────────
  function isCompleted(ev){return(ev.status||'').toLowerCase()==='completed';}
  function isGroup(ev){return ev.service&&ev.service.toLowerCase().indexOf('group')>-1;}
  function isBillable(ev){
  var s=(ev.status||'').toLowerCase();
  if(s==='cancelled'||s==='rescheduled'||s==='no_show'||s==='no-show')return false;
  return !isGroup(ev);
}

  // ── Date helpers ──────────────────────────────────────────────────────────
  function toISO(d){return d?String(d).slice(0,10):null;}
  function today(){return new Date().toISOString().slice(0,10);}
  // Billing period: Saturday – Friday
  // getSat returns the Saturday on or before a given date
  function getSat(date){
    var d=new Date(date);
    var day=d.getDay(); // 0=Sun..6=Sat
    var diff=(day+1)%7; // Sat→0, Sun→1, Mon→2, ..., Fri→6
    d.setDate(d.getDate()-diff);
    return d.toISOString().slice(0,10);
  }
  function weekEnd(ws){var d=new Date(ws+'T12:00:00');d.setDate(d.getDate()+6);return d.toISOString().slice(0,10);}

  // ── Weeks derived from events + PDI discharge dates (Sat–Fri billing periods)
  var weekSet={};
  DATA.events.forEach(function(ev){
    if(ev.date)weekSet[getSat(fromISO(ev.date))]=true;
  });
  // Always include PDI discharge weeks so they appear even with no events that week
  DATA.clients.forEach(function(c){
    var prog=c.program||'';
    if(prog!=='PDI'&&prog!=='Both')return;
    var disch=toISO(c.pdiDischarge||c.pdiDisch);
    if(disch)weekSet[getSat(fromISO(disch))]=true;
  });
  var allWeeks=Object.keys(weekSet).sort();
  if(fltFrom)allWeeks=allWeeks.filter(function(w){return w>=getSat(fromISO(fltFrom));});
  if(fltTo)  allWeeks=allWeeks.filter(function(w){return w<=getSat(fromISO(fltTo));});

  // ── Weekly-type providers: Ockman, Nicole, Gus ──────────────────────────────
  // These three ALWAYS receive the weekly Signature stipend and PDI flat stipend.
  // They are hardcoded so they are never accidentally excluded if their provider
  // record is missing or has the wrong stipendType in the calendar.
  // Names must match exactly what is used in the calendar provider list.
  var WEEKLY_CORE=['David Ockman','Nicole','Gus Hernandez'];
  // Providers who receive Signature session fees only — excluded from PDI flat stipend
  var PDI_EXCLUDED=['Rabbi Gaines','Rabbi Brandon Gaines','Rabbi'];

  // Build weeklyProviders: core three + any other pdi_weekly providers in DATA.providers
  var weeklyProviders=[];
  // Add core providers first (use calendar color if available, otherwise default)
  WEEKLY_CORE.forEach(function(p){weeklyProviders.push(p);});
  // Add any additional pdi_weekly providers configured in the calendar
  Object.keys(DATA.providers).forEach(function(p){
    if(WEEKLY_CORE.indexOf(p)===-1&&!noStipend(p)&&isWeeklyProv(p))weeklyProviders.push(p);
  });

  // Override isWeeklyProv to also catch the core three regardless of their record
  var _isWeeklyProv=isWeeklyProv;
  isWeeklyProv=function(p){return WEEKLY_CORE.indexOf(p)>-1||_isWeeklyProv(p);};
  // Override isSessionProv: core weekly providers are never session providers
  var _isSessionProv=isSessionProv;
  isSessionProv=function(p){return WEEKLY_CORE.indexOf(p)===-1&&_isSessionProv(p);};
  // Override noStipend: core weekly providers are never excluded
  var _noStipend=noStipend;
  noStipend=function(p){return WEEKLY_CORE.indexOf(p)>-1?false:_noStipend(p);};

  var lineItems=[];

  // Pre-compute the PDI stipend trigger week for each PDI client.
  // Rule: fire the flat $250 in the week containing pdiDischarge.
  // If still active (no discharge), fire in the current/last event week for that client.
  var pdiStipendWeek={};  // clientId -> ISO Monday of the week to fire
  DATA.clients.forEach(function(client){
    var prog=client.program||'';
    if(prog!=='PDI'&&prog!=='Both')return;
    var admit=toISO(client.pdiAdmit);if(!admit)return;
    var disch=toISO(client.pdiDischarge||client.pdiDisch);
    if(disch){
      // Fire in the billing period (Sat–Fri) containing discharge date
      pdiStipendWeek[client.id]=getSat(fromISO(disch));
    } else {
      // Still active — find the latest event week for this client during PDI
      var lastWk=getSat(fromISO(admit));
      DATA.events.forEach(function(ev){
        if(ev.clientId!==client.id||!ev.date)return;
        var evSat=getSat(fromISO(ev.date));
        if(evSat>lastWk)lastWk=evSat;
      });
      pdiStipendWeek[client.id]=lastWk;
    }
  });

  // Roster accumulators
  var sigHrsByStaff={},sigStiByStaff={},pdiStiByStaff={};
  var sigStaffSet={},weekStiStaffSet={},pdiStaffSet={};
  var byClientSig={},byClientPDI={};

  // ── Pre-compute PDI providers per client (once per client, not per week) ──
  // Rule: Ockman/Nicole/Gus always + any session provider with a COMPLETED
  // non-group session whose date falls within the client's PDI episode
  // (pdiAdmit ≤ session.date ≤ pdiDischarge or today if still active)
  var pdiProvsByClient={};
  DATA.clients.forEach(function(client){
    var prog=client.program||'';
    if(prog!=='PDI'&&prog!=='Both')return;
    var pdiAdmit=toISO(client.pdiAdmit);
    if(!pdiAdmit)return;
    var pdiDisch=toISO(client.pdiDischarge||client.pdiDisch)||today();
    var provs=new Set();
    // Ockman/Nicole/Gus always
    weeklyProviders.forEach(function(p){provs.add(p);});
    // Session providers: ONLY sessions that occurred DURING the PDI episode
    DATA.events.forEach(function(ev){
      if(ev.clientId!==client.id)return;
      if(!isBillable(ev))return;
      // Compare dates robustly: take first 10 chars of each
      var evDate=(ev.date||'').slice(0,10);
      if(!evDate||evDate<pdiAdmit.slice(0,10)||evDate>pdiDisch.slice(0,10))return;
      if(!ev.provider||!ev.provider.trim())return;
      if(noStipend(ev.provider)||!isSessionProv(ev.provider))return;
      if(PDI_EXCLUDED.indexOf(ev.provider)>-1)return; // excluded from PDI flat stipend
      provs.add(ev.provider);
    });
    pdiProvsByClient[client.id]=provs;
  });

  allWeeks.forEach(function(wStart){
    var wEnd=weekEnd(wStart);
    var wLbl=wkLabel(wStart);
    var wEvs=DATA.events.filter(function(ev){return ev.date&&getSat(fromISO(ev.date))===wStart;});

    // ════════════════════════════════════════════════════════════════
    // SIGNATURE
    // ════════════════════════════════════════════════════════════════
    if(fltTrack!=='PDI'){

      // Active Signature clients this week: sigAdmit ≤ wEnd AND (no sigDisch OR sigDisch ≥ wStart)
      var activeSig=DATA.clients.filter(function(c){
        var prog=c.program||'';
        if(prog!=='Signature'&&prog!=='Both')return false;
        var admit=toISO(c.sigAdmit);
        var disch=toISO(c.sigDischarge||c.sigDisch);
        if(!admit||admit>wEnd)return false;
        if(disch&&disch<wStart)return false;
        return true;
      });

      activeSig.forEach(function(client){
        var cid=client.id,cName=client.name;
        var sigAdmit=toISO(client.sigAdmit);
        var sigDisch =toISO(client.sigDischarge||client.sigDisch)||today();
        if(!byClientSig[cid])byClientSig[cid]={staffHrs:{},weeklyStaff:new Set(),sigHrs:0,sessAmt:0,wklyAmt:0};

        // ── Weekly stipend: $250/wk per active Sig client (Ockman/Nicole/Gus) ──
        weeklyProviders.forEach(function(prov){
          lineItems.push({week:wLbl,wStart:wStart,client:cName,track:'Signature',
            staff:displayName(prov),type:'Weekly Stipend',sessHrs:'',rate:'',amount:250,counted:250,notes:''});
          if(!sigStiByStaff[prov])sigStiByStaff[prov]={};
          sigStiByStaff[prov][wStart]=(sigStiByStaff[prov][wStart]||0)+250;
          weekStiStaffSet[prov]=true;
          byClientSig[cid].weeklyStaff.add(prov);
          byClientSig[cid].wklyAmt+=250;
        });

        // ── Session fees: $150/completed session, ONLY within Signature episode dates ──
        var sessMap={};
        var sessCount={}; // track event count separately from slot count
        wEvs.forEach(function(ev){
          if(ev.clientId!==cid)return;
          if(!ev.provider||!ev.provider.trim())return;
          if(!isSessionProv(ev.provider))return;
          if(!isBillable(ev))return; // completed only, no groups
          // activeSig already confirms client was admitted and not discharged this week
          if(!sessMap[ev.provider])sessMap[ev.provider]=0;
          if(!sessCount[ev.provider])sessCount[ev.provider]=0;
          sessMap[ev.provider]+=1; // slots (30 min each)
          sessCount[ev.provider]+=1;             // event count
        });
        Object.keys(sessMap).forEach(function(prov){
          var slots=sessMap[prov],hrs=slots,amt=hrs*150;
          var evCt=sessCount[prov]||0;
          lineItems.push({week:wLbl,wStart:wStart,client:cName,track:'Signature',
            staff:displayName(prov),type:'Session',sessHrs:hrs,rate:150,amount:amt,counted:amt,
            notes:evCt+' completed session'+(evCt!==1?'s':'')+' @ $150 each = '+fmt$(amt)});
          if(!sigHrsByStaff[prov])sigHrsByStaff[prov]={};
          sigHrsByStaff[prov][wStart]=(sigHrsByStaff[prov][wStart]||0)+hrs;
          sigStaffSet[prov]=true;
          if(!byClientSig[cid].staffHrs[prov])byClientSig[cid].staffHrs[prov]=0;
          byClientSig[cid].staffHrs[prov]+=hrs;
          byClientSig[cid].sigHrs+=hrs;
          byClientSig[cid].sessAmt+=amt;
        });
      });
    }

    // ════════════════════════════════════════════════════════════════
    // PDI — $250 flat per provider per episode, triggered on discharge week
    // The stipend fires ONCE in the week that contains pdiDischarge.
    // For still-active PDI clients, fires in their latest event week.
    // ════════════════════════════════════════════════════════════════
    if(fltTrack!=='Signature'){

      // Only PDI clients whose stipend trigger week is THIS week
      var pdiThisWeek=DATA.clients.filter(function(c){
        var prog=c.program||'';
        if(prog!=='PDI'&&prog!=='Both')return false;
        if(!c.pdiAdmit)return false;
        return pdiStipendWeek[c.id]===wStart;
      });

      pdiThisWeek.forEach(function(client){
        var cid=client.id,cName=client.name;
        if(!byClientPDI[cid])byClientPDI[cid]={staffAmt:{}};
        var provs=pdiProvsByClient[cid]||new Set();
        var disch=toISO(client.pdiDischarge||client.pdiDisch);
        var note=disch?'PDI discharge: '+disch:'PDI episode active — stipend in latest event week';

        provs.forEach(function(prov){
          lineItems.push({week:wLbl,wStart:wStart,client:cName,track:'PDI',
            staff:displayName(prov),type:'Flat Stipend',sessHrs:'',rate:'',amount:250,counted:250,
            notes:note});
          if(!pdiStiByStaff[prov])pdiStiByStaff[prov]={};
          pdiStiByStaff[prov][wStart]=(pdiStiByStaff[prov][wStart]||0)+250;
          pdiStaffSet[prov]=true;
          byClientPDI[cid].staffAmt[prov]=(byClientPDI[cid].staffAmt[prov]||0)+250;
        });
      });
    }
  });

  // ── Weekly summary ────────────────────────────────────────────────────────
  var sumMap={};
  lineItems.forEach(function(li){
    if(!sumMap[li.wStart])sumMap[li.wStart]={week:li.week,wStart:li.wStart,sigHrs:0,sigCost:0,pdiCost:0};
    if(li.track==='Signature'){
      if(li.type==='Session'){sumMap[li.wStart].sigHrs+=li.sessHrs||0;sumMap[li.wStart].sigCost+=li.amount;}
      else{sumMap[li.wStart].sigCost+=li.amount;}
    }else{
      sumMap[li.wStart].pdiCost+=li.counted||li.amount||0;
    }
  });
  var summaryFinal=allWeeks.filter(function(w){return sumMap[w];}).map(function(w){
    var r=sumMap[w];return{week:r.week,wStart:w,sigHrs:r.sigHrs,sigCost:r.sigCost,pdiCost:r.pdiCost,combined:r.sigCost+r.pdiCost};
  });

  return{lineItems:lineItems,summaryFinal:summaryFinal,sortedWeeks:allWeeks,
    sigHrsByStaff:sigHrsByStaff,sigStiByStaff:sigStiByStaff,pdiStiByStaff:pdiStiByStaff,
    sigStaffSet:sigStaffSet,weekStiStaffSet:weekStiStaffSet,pdiStaffSet:pdiStaffSet,
    byClientSig:byClientSig,byClientPDI:byClientPDI,fltTrack:fltTrack};
}

// ── RENDER ─────────────────────────────────────────────────────────────────
var approvals={};// key: 'staff::weekStart' -> true/false

function saveApprovals(){
  try{firebase.database().ref('schedule_v3/stipend_approvals').set(approvals);}catch(e){}
}
function loadApprovals(cb){
  try{firebase.database().ref('schedule_v3/stipend_approvals').once('value',function(s){
    approvals=s.val()||{};cb();
  });}catch(e){cb();}
}
function toggleApproval(key){
  if(!key)return;
  approvals[key]=!approvals[key];
  saveApprovals();
  // Re-render the tab so all buttons refresh
  if(window._lastD)renderByStaff(window._lastD);
}

function renderByStaff(D){
  var el=document.getElementById('bystaff-content');if(!el)return;
  function fmt$(v){return v||v===0?'$'+(+v).toFixed(2):'-';}
  function fmtH(v){return v||v===0?(+v).toFixed(1)+' hr':'-';}

  // Build staff -> week -> amounts
  var staffMap={};
  D.lineItems.forEach(function(li){
    var prov=li.staff;
    if(!staffMap[prov])staffMap[prov]={weeks:{}};
    var wk=li.wStart;
    if(!staffMap[prov].weeks[wk])staffMap[prov].weeks[wk]={sigHrs:0,sigSess:0,sigWkly:0,pdi:0};
    if(li.track==='Signature'){
      if(li.type==='Session'){staffMap[prov].weeks[wk].sigHrs+=li.sessHrs||0;staffMap[prov].weeks[wk].sigSess+=li.amount||0;}
      else{staffMap[prov].weeks[wk].sigWkly+=li.amount||0;}
    }else{
      staffMap[prov].weeks[wk].pdi+=li.counted||0;
    }
  });

  var weeks=D.sortedWeeks.slice().sort();

  // Week label: Mon – Sun (pay period)
  function wLbl(iso){
    var d=new Date(iso+'T12:00:00'),e=new Date(iso+'T12:00:00');
    e.setDate(e.getDate()+6);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+
      ' \u2013 '+e.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }
  // Approval key per therapist per week
  function apvKey(staff,wkISO){return 'staff::'+staff+'::'+wkISO;}
  function isApvd(staff,wkISO){return !!approvals[apvKey(staff,wkISO)];}
  function btnId(staff,wkISO){return 'apv_'+staff.replace(/[^a-zA-Z0-9]/g,'_')+'_'+wkISO.replace(/-/g,'');}

  var staffList=Object.keys(staffMap).sort();
  if(!staffList.length){
    el.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx3)">No stipend data for selected period.</div>';
    return;
  }

  var html='<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;flex-wrap:wrap;gap:10px">'+
    '<div>'+
      '<div style="font-size:14px;font-weight:600">By Therapist by Week</div>'+
      '<div style="font-size:11px;color:var(--tx3);margin-top:3px">'+
        'Approve each pay period (Mon\u2013Sun) per therapist. Saved to Firebase in real time.</div>'+
    '</div>'+
    '<button class="excel-btn" onclick="exportByStaffExcel()">\u2193 Export to Excel</button>'+
  '</div>';

  staffList.forEach(function(staff){
    var wdata=staffMap[staff].weeks;
    // Collect active weeks for this staff member
    var activeWeeks=weeks.filter(function(wk){
      var r=wdata[wk];return r&&(r.sigSess+r.sigWkly+r.pdi)>0;
    });
    if(!activeWeeks.length)return;

    var tSigHrs=0,tSigSess=0,tSigWkly=0,tPDI=0;
    activeWeeks.forEach(function(wk){
      tSigHrs+=wdata[wk].sigHrs;tSigSess+=wdata[wk].sigSess;
      tSigWkly+=wdata[wk].sigWkly;tPDI+=wdata[wk].pdi;
    });
    var staffTotal=tSigSess+tSigWkly+tPDI;
    // All weeks approved = overall green header
    var allApvd=activeWeeks.length>0&&activeWeeks.every(function(wk){return isApvd(staff,wk);});
    var anyApvd=activeWeeks.some(function(wk){return isApvd(staff,wk);});

    html+='<div style="margin:0 16px 20px;border:.5px solid '+(allApvd?'#1D9E75':'var(--bd)')+';border-radius:12px;overflow:hidden">'+
      // Provider header
      '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:'+(allApvd?'#f0fdf4':anyApvd?'#fffbeb':'var(--bg2)')+';border-bottom:.5px solid var(--bd)">'+
        '<div style="width:36px;height:36px;border-radius:50%;background:#6b5c45;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0">'+staff.charAt(0).toUpperCase()+'</div>'+
        '<div style="flex:1">'+
          '<div style="font-size:14px;font-weight:600;color:var(--tx)">'+staff+'</div>'+
          '<div style="font-size:11px;color:var(--tx3);margin-top:2px">'+
            (tSigHrs?fmtH(tSigHrs)+' direct hrs &nbsp;':'')+
            (tSigSess?'&nbsp;'+fmt$(tSigSess)+' session fees &nbsp;':'')+
            (tSigWkly?'&nbsp;'+fmt$(tSigWkly)+' weekly &nbsp;':'')+
            (tPDI?'&nbsp;'+fmt$(tPDI)+' PDI':'')+
          '</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:20px;font-weight:700;color:var(--green)">'+fmt$(staffTotal)+'</div>'+
          '<div style="font-size:10px;color:var(--tx3);margin-top:2px">'+
            (allApvd?'<span style="color:var(--green)">\u2713 All weeks approved</span>':
             anyApvd?'<span style="color:var(--amber)">Partial approval</span>':
             '<span>No approvals</span>')+
          '</div>'+
        '</div>'+
      '</div>'+
      // Week-by-week table with approval per row
      '<div style="overflow:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'+
        '<thead><tr style="background:#f8f7f5">'+
          '<th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--tx2)">Pay Period (Mon\u2013Sun)</th>'+
          '<th style="padding:8px 10px;text-align:right;font-size:10px;font-weight:500;color:var(--tx3)">Sig Hours</th>'+
          '<th style="padding:8px 10px;text-align:right;font-size:10px;font-weight:500;color:var(--tx3)">Session Fees</th>'+
          '<th style="padding:8px 10px;text-align:right;font-size:10px;font-weight:500;color:var(--tx3)">Weekly Stipend</th>'+
          '<th style="padding:8px 10px;text-align:right;font-size:10px;font-weight:500;color:var(--tx3)">PDI Stipend</th>'+
          '<th style="padding:8px 10px;text-align:right;font-size:10px;font-weight:600;color:var(--tx2)">Total</th>'+
          '<th style="padding:8px 14px;text-align:center;font-size:10px;font-weight:500;color:var(--tx3)">Approved</th>'+
        '</tr></thead><tbody>';

    activeWeeks.forEach(function(wk,ri){
      var r=wdata[wk];
      var wTotal=r.sigSess+r.sigWkly+r.pdi;
      var apvd=isApvd(staff,wk);
      var bid=btnId(staff,wk);
      var rowBg=apvd?'background:#f0fdf4':ri%2===0?'':'background:var(--bg)';
      html+='<tr style="'+rowBg+'">'+
        '<td style="padding:8px 14px;border-top:.5px solid var(--bd);font-weight:500;white-space:nowrap">'+wLbl(wk)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;border-top:.5px solid var(--bd);color:var(--tx3)">'+fmtH(r.sigHrs)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;border-top:.5px solid var(--bd)">'+fmt$(r.sigSess)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;border-top:.5px solid var(--bd)">'+fmt$(r.sigWkly)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;border-top:.5px solid var(--bd)">'+fmt$(r.pdi)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;border-top:.5px solid var(--bd);font-weight:700;color:var(--green)">'+fmt$(wTotal)+'</td>'+
        '<td style="padding:7px 14px;text-align:center;border-top:.5px solid var(--bd)">'+
          '<button id="'+bid+'" onclick="toggleWeekApproval(\''+apvKey(staff,wk)+'\',\''+bid+'\')" '+
            'style="padding:5px 14px;border-radius:16px;border:1.5px solid '+(apvd?'#1D9E75':'var(--bd2)')+';'+
            'background:'+(apvd?'#1D9E75':'transparent')+';color:'+(apvd?'#fff':'var(--tx3)')+';'+
            'cursor:pointer;font-size:11px;font-weight:600;font-family:var(--f);min-width:90px;transition:all .15s">'+
            (apvd?'\u2713 Approved':'Approve')+'</button>'+
        '</td>'+
      '</tr>';
    });

    // Totals row
    html+='<tr style="background:#1e170e;color:#fff">'+
      '<td style="padding:9px 14px;font-weight:700">Total</td>'+
      '<td style="padding:8px 10px;text-align:right">'+fmtH(tSigHrs)+'</td>'+
      '<td style="padding:8px 10px;text-align:right">'+fmt$(tSigSess)+'</td>'+
      '<td style="padding:8px 10px;text-align:right">'+fmt$(tSigWkly)+'</td>'+
      '<td style="padding:8px 10px;text-align:right">'+fmt$(tPDI)+'</td>'+
      '<td style="padding:8px 10px;text-align:right;font-weight:700;color:#86efac">'+fmt$(staffTotal)+'</td>'+
      '<td></td>'+
    '</tr></tbody></table></div></div>';
  });

  el.innerHTML=html;
}

function toggleWeekApproval(key,btnId){
  if(!key)return;
  approvals[key]=!approvals[key];
  saveApprovals();
  if(window._lastD)renderByStaff(window._lastD);
}

function toggleProvApproval(apvKey,btnId){
  approvals[apvKey]=!approvals[apvKey];
  saveApprovals();
  if(window._lastD)renderByStaff(window._lastD);
}

function render(){
  var D=computeStipends();
  window._lastD=D;
  renderSummary(D);
  renderLineItems(D);
  renderRoster(D);
  renderByClient(D);
  renderByStaff(D);
  renderFilterBadges(D);

function dlCSV(rows, filename){
  var csv = rows.map(function(r){
    return r.map(function(v){
      return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
    }).join(',');
  }).join('\r\n');
  var blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exportByStaffExcel(){
  var D=window._lastD;if(!D||!D.lineItems.length){alert('No data to export for the current filter period.');return;}

  // Build staff -> weekISO -> amounts (keyed by wStart, not display label)
  var staffMap={};
  D.lineItems.forEach(function(li){
    var prov=li.staff;
    if(!prov)return;
    if(!staffMap[prov])staffMap[prov]={};
    var wk=li.wStart; // ISO date of billing period Saturday
    if(!staffMap[prov][wk])staffMap[prov][wk]={sigHrs:0,sigSess:0,sigWkly:0,pdi:0};
    if(li.track==='Signature'){
      if(li.type==='Session'){
        staffMap[prov][wk].sigHrs+=(li.sessHrs||0);
        staffMap[prov][wk].sigSess+=(li.amount||0);
      } else {
        staffMap[prov][wk].sigWkly+=(li.amount||0);
      }
    } else {
      staffMap[prov][wk].pdi+=(li.counted||0);
    }
  });

  var staffList=Object.keys(staffMap).sort();
  var weeks=D.sortedWeeks.slice().sort();

  // Billing period label: Sat – Fri
  function wLbl(iso){
    var d=new Date(iso+'T12:00:00'),e=new Date(iso+'T12:00:00');
    e.setDate(e.getDate()+6);
    return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+
      ' \u2013 '+e.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  }

  function apvKey(staff,wkISO){return 'staff::'+staff+'::'+wkISO;}

  var rows=[];

  // Header
  rows.push(['PDI / Signature Staff Stipend Approval Report']);
  rows.push(['Generated: '+new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})]);
  rows.push(['Billing period: Saturday \u2013 Friday']);
  rows.push([]);

  // Column headers
  rows.push([
    'Therapist',
    'Billing Period',
    'Sig Direct Hours',
    'Session Fees ($)',
    'Weekly Stipend ($)',
    'PDI Flat Stipend ($)',
    'Period Total ($)',
    'Approval Status',
    'Approved By'
  ]);

  var grandSigHrs=0,grandSigSess=0,grandSigWkly=0,grandPDI=0,grandTot=0;

  staffList.forEach(function(staff){
    var wdata=staffMap[staff];
    var activeWeeks=weeks.filter(function(wk){
      var r=wdata[wk];return r&&(r.sigSess+r.sigWkly+r.pdi)>0;
    });
    if(!activeWeeks.length)return;

    var tSigHrs=0,tSigSess=0,tSigWkly=0,tPDI=0;

    activeWeeks.forEach(function(wk){
      var r=wdata[wk];
      var wTotal=r.sigSess+r.sigWkly+r.pdi;
      var apvd=!!approvals[apvKey(staff,wk)];
      tSigHrs+=r.sigHrs;tSigSess+=r.sigSess;tSigWkly+=r.sigWkly;tPDI+=r.pdi;
      rows.push([
        staff,
        wLbl(wk),
        r.sigHrs?r.sigHrs.toFixed(2):'',
        r.sigSess?r.sigSess.toFixed(2):'',
        r.sigWkly?r.sigWkly.toFixed(2):'',
        r.pdi?r.pdi.toFixed(2):'',
        wTotal.toFixed(2),
        apvd?'APPROVED':'Pending',
        apvd?'Finance':'—'
      ]);
    });

    var staffTotal=tSigSess+tSigWkly+tPDI;
    var allApvd=activeWeeks.every(function(wk){return !!approvals[apvKey(staff,wk)];});
    // Staff subtotal row
    rows.push([
      staff+' TOTAL','',
      tSigHrs?tSigHrs.toFixed(2):'',
      tSigSess?tSigSess.toFixed(2):'',
      tSigWkly?tSigWkly.toFixed(2):'',
      tPDI?tPDI.toFixed(2):'',
      staffTotal.toFixed(2),
      allApvd?'ALL APPROVED':'Partial/Pending',
      ''
    ]);
    rows.push([]);

    grandSigHrs+=tSigHrs;grandSigSess+=tSigSess;
    grandSigWkly+=tSigWkly;grandPDI+=tPDI;
    grandTot+=staffTotal;
  });

  // Grand total
  rows.push([]);
  rows.push([
    'GRAND TOTAL','',
    grandSigHrs.toFixed(2),
    grandSigSess.toFixed(2),
    grandSigWkly.toFixed(2),
    grandPDI.toFixed(2),
    grandTot.toFixed(2),
    '','']);

  dlCSV(rows,'Stipend_Approval_Report.csv');
}

function exportSummaryExcel(){
  var D=window._lastD;if(!D)return;
  var tot=D.summaryFinal;
  function mLbl(k){return new Date(k+'-15').toLocaleDateString('en-US',{month:'long',year:'numeric'});}
  // Monthly rollup
  var monthMap={};
  tot.forEach(function(r){
    var m=r.wStart.slice(0,7);
    if(!monthMap[m])monthMap[m]={sigHrs:0,sigCost:0,pdiCost:0};
    monthMap[m].sigHrs+=r.sigHrs;monthMap[m].sigCost+=r.sigCost;monthMap[m].pdiCost+=r.pdiCost;
  });
  // Quarterly rollup
  var qMap={};
  tot.forEach(function(r){
    var mo=parseInt(r.wStart.slice(5,7)),yr=r.wStart.slice(0,4);
    var q=yr+' Q'+Math.ceil(mo/3);
    if(!qMap[q])qMap[q]={sigHrs:0,sigCost:0,pdiCost:0};
    qMap[q].sigHrs+=r.sigHrs;qMap[q].sigCost+=r.sigCost;qMap[q].pdiCost+=r.pdiCost;
  });
  var rows=[['Period','Type','Sig Hours','Sig Stipend ($)','PDI Stipend ($)','Total ($)']];
  // By Week
  rows.push(['--- BY BILLING PERIOD (Sat\u2013Fri) ---','','','','','']);
  tot.forEach(function(r){rows.push([r.week,'Week',fmt2(r.sigHrs),fmt2(r.sigCost),fmt2(r.pdiCost),fmt2(r.sigCost+r.pdiCost)]);});
  rows.push(['','','','','','']);
  // By Month
  rows.push(['--- BY MONTH ---','','','','','']);
  Object.keys(monthMap).sort().forEach(function(k){var m=monthMap[k];rows.push([mLbl(k),'Month',fmt2(m.sigHrs),fmt2(m.sigCost),fmt2(m.pdiCost),fmt2(m.sigCost+m.pdiCost)]);});
  rows.push(['','','','','','']);
  // By Quarter
  rows.push(['--- BY QUARTER ---','','','','','']);
  Object.keys(qMap).sort().forEach(function(k){var q=qMap[k];rows.push([k,'Quarter',fmt2(q.sigHrs),fmt2(q.sigCost),fmt2(q.pdiCost),fmt2(q.sigCost+q.pdiCost)]);});
  // Grand total
  var gSig=tot.reduce(function(s,r){return s+r.sigCost;},0);
  var gPDI=tot.reduce(function(s,r){return s+r.pdiCost;},0);
  var gHrs=tot.reduce(function(s,r){return s+r.sigHrs;},0);
  rows.push(['GRAND TOTAL','',fmt2(gHrs),fmt2(gSig),fmt2(gPDI),fmt2(gSig+gPDI)]);
  dlCSV(rows,'Stipend_Summary.csv');
}

function exportRosterExcel(){

}

function exportByClientExcel(){
  var D=window._lastD;if(!D)return;
  function cName(cid){var c=DATA.clients.find(function(c){return c.id===cid;});return c?c.name:cid;}
  var rows=[['Client','Track','Provider','Type','Amount ($)']];
  // Signature
  Object.keys(D.byClientSig).forEach(function(cid){
    var b=D.byClientSig[cid];
    Object.keys(b.staffHrs||{}).forEach(function(p){
      var hrs=b.staffHrs[p];
      rows.push([cName(cid),'Signature',p,'Session Fees',fmt2(hrs*150)]);
    });
    if(b.wklyAmt){
      rows.push([cName(cid),'Signature','Weekly Providers','Weekly Stipend',fmt2(b.wklyAmt)]);
    }
  });
  // PDI
  Object.keys(D.byClientPDI).forEach(function(cid){
    var b=D.byClientPDI[cid];
    Object.keys(b.staffAmt||{}).forEach(function(p){
      rows.push([cName(cid),'PDI',p,'Flat Stipend',fmt2(b.staffAmt[p])]);
    });
  });
  dlCSV(rows,'Stipend_By_Client.csv');
}
